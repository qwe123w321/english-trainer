const LISTEN = [{"title":"What a SAFE Really Is","lines":[["Okay, so let's talk about the SAFE.","好，我們來聊聊 SAFE 這個東西。"],["It stands for Simple Agreement for Future Equity.","它的全名是「未來股權簡單協議」。"],["Honestly, that name sounds scarier than it is.","老實說，這名字聽起來比實際嚇人多了。"],["Here's an easy way to think about it.","我用一個簡單的方式來說。"],["An investor gives you money now.","投資人現在先給你一筆錢。"],["But you don't hand over shares right away.","但你不會馬上給他們股份。"],["They get shares later, at your next round.","他們是在你下一輪募資時才拿到股份。"],["So you skip the valuation fight today.","所以你今天就不用為了估值吵半天。"],["That's why early founders love it. It's fast.","這就是早期創辦人喜歡它的原因，因為快。"],["Most SAFEs use a valuation cap or a discount.","大多數的 SAFE 會用估值上限或折扣。"],["That just rewards the investor for coming in early.","這只是在回饋很早就進場的投資人。"],["Y Combinator made the standard SAFE template free.","Y Combinator 把標準的 SAFE 範本免費公開了。"],["So please don't pay a lawyer to reinvent it.","所以拜託，別花錢請律師重寫一份。"],["And it's not a loan. That part really matters.","而且它不是貸款，這一點真的很重要。"]]},{"title":"Burn Rate and Runway, Explained Simply","lines":[["Let's talk about two words you'll hear a lot.","我們來聊兩個你會常常聽到的詞。"],["Burn rate, and runway.","燒錢速度，還有可撐時間。"],["Burn rate is how much cash you spend each month.","燒錢速度，就是你每個月花掉多少現金。"],["Think salaries, servers, rent, all of it.","想想薪水、伺服器、房租，全部加起來。"],["Say you spend ten thousand dollars a month.","假設你每個月花一萬美金。"],["That's your monthly burn. Pretty simple.","那就是你的月燒錢額，蠻單純的。"],["Now, runway is how long that cash lasts.","再來，可撐時間就是這些錢能撐多久。"],["Say you have a hundred thousand in the bank.","假設你銀行裡有十萬塊。"],["Then you've got ten months of runway.","那你就有十個月的可撐時間。"],["And ten months goes by really fast.","而十個月過得真的超快。"],["So founders watch runway like a fuel gauge.","所以創辦人盯著可撐時間，就像看油表一樣。"],["The rule of thumb is to raise before you hit empty.","通用的原則是，在見底之前就要去募資。"],["Most people start fundraising with six months left.","大多數人會在剩六個月時就開始募資。"],["Because running out of cash kills most startups.","因為現金燒光，是搞垮新創最常見的原因。"]]},{"title":"MRR, ARR and Churn in Plain English","lines":[["Today, three little letters you'll need.","今天要講三個你會用到的小縮寫。"],["MRR, ARR, and churn.","MRR、ARR，還有 churn。"],["MRR is monthly recurring revenue.","MRR 就是每月經常性收入。"],["It's the money you make every month, like clockwork.","就是你每個月固定賺進來的錢，很規律。"],["Subscriptions are the classic example here.","訂閱制就是最經典的例子。"],["ARR is just that number times twelve.","ARR 就是把那個數字乘以十二。"],["So ARR is your yearly recurring revenue.","所以 ARR 就是你的年度經常性收入。"],["Investors love these because they're predictable.","投資人愛這兩個數字，因為它們可以預測。"],["Now here's the painful one. Churn.","接下來講比較痛的那個，churn。"],["Churn is the percentage of customers who leave.","churn 就是流失掉的客戶比例。"],["If a hundred sign up and five quit, that's five percent.","如果一百人加入、五人退出，那就是百分之五。"],["High churn means you're filling a leaky bucket.","churn 太高，就像你在裝一個漏水的桶子。"],["You pour in users, but they keep draining out.","你一直倒用戶進去，他們卻一直流走。"],["So grow MRR while cutting churn. That's the real game.","所以一邊衝高 MRR、一邊壓低 churn，才是真正的關鍵。"]]},{"title":"Vesting and Why It Actually Protects You","lines":[["Let's talk about vesting. Don't tune out.","我們來聊 vesting，先別急著放空。"],["I know, it sounds like boring legal stuff.","我知道，它聽起來像無聊的法律東西。"],["But this one quietly protects you.","但這件事其實默默在保護你。"],["Vesting means you earn your shares over time.","vesting 的意思是，你的股份是隨時間慢慢賺到的。"],["You don't get them all on day one.","你不會在第一天就全部拿到。"],["The usual setup is four years with a one-year cliff.","常見的設定是四年期，加一年的「懸崖期」。"],["Cliff just means nothing vests in year one.","懸崖期的意思是，第一年完全還沒有歸屬。"],["Stay past one year, and a chunk unlocks at once.","撐過一年，就會一口氣解鎖一大塊。"],["After that, the rest drips in every month.","之後剩下的，就每個月一點一點地進來。"],["So why does this protect you, the founder?","那這為什麼是在保護你這個創辦人呢？"],["Imagine a co-founder quits after two months.","想像一下，某個共同創辦人做兩個月就跑了。"],["Without vesting, they walk off with half the company.","如果沒有 vesting，他可能就帶走公司一半的股份。"],["With vesting, they leave with almost nothing.","有了 vesting，他幾乎什麼都帶不走。"],["So set it up early, even between the two of you.","所以早點設好，就算是你們兩個之間也一樣。"]]},{"title":"The MVP Mindset: Ship Small, Learn Fast","lines":[["Let's talk about the MVP mindset.","我們來聊聊 MVP 的心態。"],["MVP means minimum viable product.","MVP 就是最小可行產品。"],["It's the smallest thing you can show users.","就是你能拿給用戶看的、最小的那個版本。"],["Not the perfect version, just enough to test the idea.","不是完美版本，只是剛好足夠來驗證想法。"],["A lot of founders get this part wrong.","很多創辦人在這一步就搞錯了。"],["They hide for a year, building in secret.","他們躲起來，偷偷做了一整年。"],["Then they launch, and nobody actually wants it.","然後一上線，發現根本沒人想要。"],["That's a whole year of runway, gone.","那可是整整一年的可撐時間，沒了。"],["The MVP way is the opposite. You ship small.","MVP 的做法剛好相反，你先做小一點就上線。"],["You put something rough out there, fast.","你把一個還很粗糙的東西，快快推出去。"],["Then you watch how real people actually use it.","然後你觀察真實的人是怎麼用它的。"],["Their behavior tells you what to build next.","他們的行為會告訴你下一步該做什麼。"],["So ship small, learn fast, and keep going.","所以做小一點、學快一點，然後一直走下去。"],["Honestly, that loop is the whole job.","說真的，這個循環就是這份工作的全部了。"]]},{"title":"The Week We Raised Our Seed Round","lines":[["This is the week it all came together.","這就是一切終於到位的那一週。"],["We had been pitching investors for almost two months.","我們已經向投資人提案將近兩個月了。"],["Honestly, I heard \"no\" more times than I can count.","老實說，我聽到的「不」多到數不清。"],["Then on Monday, one angel investor just said yes.","然後在週一，一位天使投資人就直接答應了。"],["That first check made the whole round feel real.","那第一張支票，讓整輪募資變得真實了起來。"],["Once one person is in, others start paying attention.","只要有一個人加入，其他人就開始關注了。"],["We call that momentum, and it really helps.","我們把這個叫做動能，它真的很有幫助。"],["By Thursday, the round was almost full.","到了週四，這一輪幾乎就要滿了。"],["We closed at one and a half million dollars.","我們最後以一百五十萬美元結案。"],["Most of it came in through a simple SAFE.","其中大部分是透過一份簡單的 SAFE 協議進來的。"],["A SAFE lets you raise fast without setting a price yet.","SAFE 讓你能快速募資，而暫時還不用先定估值。"],["I was exhausted, but quietly proud of the team.","我累壞了，但也為這個團隊感到默默驕傲。"],["The money is just fuel, not the finish line.","這筆錢只是燃料，不是終點線。"],["Now the real work begins, building the product.","現在真正的工作才要開始，那就是打造產品。"]]},{"title":"Your First Investor Meeting: What to Expect","lines":[["Let's talk about your very first investor meeting.","我們來聊聊你人生中第一場投資人會議。"],["First, take a breath. It's just a conversation.","首先，深呼吸。這只是一場對話而已。"],["Most first meetings are short, around thirty minutes.","大多數第一次的會議都很短，大約三十分鐘。"],["The investor wants to understand you and your idea.","投資人想要了解你，還有你的點子。"],["They'll ask about the problem you're solving.","他們會問你正在解決什麼樣的問題。"],["They'll ask how big the market could be.","他們會問這個市場可能有多大。"],["And they always ask: why you, and why now?","而他們總是會問：為什麼是你，又為什麼是現在？"],["Be honest about what you don't know yet.","對於你還不知道的事，要誠實以對。"],["Saying \"good question, let me find out\" is fine.","說「這問題很好，讓我去查清楚」是完全沒問題的。"],["Show them traction. Even small early numbers help.","讓他們看到成長跡象，就算是很小的早期數字也有幫助。"],["This first meeting is rarely about getting a check.","這第一場會議，很少是為了當場拿到支票。"],["It's really about starting a relationship.","它真正的目的，是開啟一段關係。"],["Always ask for the next step before you leave.","在離開之前，記得問清楚下一步是什麼。"],["And send a short thank-you email the same day.","然後在當天寄出一封簡短的感謝信。"]]},{"title":"How to Cold Email an Investor","lines":[["Cold emailing an investor sounds scary, but it works.","對投資人發出陌生開發信聽起來很可怕，但它其實有用。"],["The key is to keep it short and human.","關鍵是要寫得簡短，而且有人味。"],["Nobody reads a long email from a stranger.","沒有人會讀一封陌生人寄來的長信。"],["Aim for five sentences, maybe six at most.","目標是五句話，最多大概六句。"],["Your subject line should be clear, not clever.","你的主旨欄要寫得清楚，而不是耍小聰明。"],["Open with one line on why you're emailing them.","開頭用一句話，說明你為什麼寫信給他們。"],["Mention a warm reason, like a shared connection.","提一個有溫度的理由，例如你們共同認識的人。"],["Then say what you do in one simple sentence.","接著用一句簡單的話，說明你在做什麼。"],["Drop one strong number that shows real traction.","丟出一個有力的數字，證明你真的有成長。"],["Something like, we grew thirty percent last month.","像是「我們上個月成長了百分之三十」這樣。"],["End with one small, easy ask, like a quick call.","用一個小而容易答應的請求作結，例如一通簡短的通話。"],["Attach your deck, but don't make it required reading.","附上你的簡報，但別讓它變成非讀不可的東西。"],["If they don't reply, follow up once, politely.","如果他們沒回，就禮貌地追問一次。"],["One good follow-up often beats the first email.","一封好的追問信，常常比第一封信還有效。"]]},{"title":"Pitching Your Startup in Thirty Seconds","lines":[["Imagine you meet an investor in an elevator.","想像你在電梯裡遇到了一位投資人。"],["You have about thirty seconds. Make them count.","你大概有三十秒，要好好把握。"],["This short version is called your elevator pitch.","這個簡短的版本，就叫做你的電梯簡報。"],["Start with the problem, not with your product.","從問題開始講，而不是從你的產品開始。"],["People care about the pain before the features.","在乎功能之前，人們會先在乎痛點。"],["Say who has the problem and why it hurts.","說清楚是誰有這個問題，以及為什麼它很惱人。"],["Then explain your solution in one plain sentence.","接著用一句白話，解釋你的解決方案。"],["Skip the buzzwords. Just say what it does.","別用那些花俏的術語，直接說它能做什麼。"],["Add one line on why your team can win.","再加一句話，說明為什麼你的團隊能勝出。"],["If you have traction, mention it right here.","如果你有成長跡象，就在這裡順手提一下。"],["Numbers stick better than adjectives do.","數字比形容詞更讓人記得住。"],["Then close by saying what you're looking for.","最後用一句話收尾，說明你正在尋找什麼。"],["Maybe it's a meeting, an intro, or some advice.","也許是一場會議，一個引薦，或是一些建議。"],["Practice it out loud until it sounds like you.","把它大聲練到聽起來就像你自己在說話為止。"]]},{"title":"Why We Set Up a Delaware C-Corp","lines":[["Today let's talk about something boring but important.","今天我們來聊一件無聊但很重要的事。"],["When we started raising money, our lawyer had one tip.","當我們開始募資時，我們的律師給了一個建議。"],["He said, set up a Delaware C-corp.","他說，去成立一家德拉瓦州的 C 型公司。"],["Delaware is a small state in the United States.","德拉瓦是美國一個很小的州。"],["But most big startups are registered there.","但大多數的大型新創公司都是在那裡註冊的。"],["Investors are just used to its rules and courts.","投資人就是習慣了它的法規和法院系統。"],["Familiar paperwork makes a deal close faster.","熟悉的文件流程，能讓交易更快談成。"],["A C-corp can also issue different classes of shares.","C 型公司還可以發行不同類別的股份。"],["That matters a lot when you raise from VCs.","當你向創投募資時，這一點非常重要。"],["It also lets you give your team stock options.","它也讓你能發放股票選擇權給你的團隊。"],["Yes, there's some extra cost and filing each year.","沒錯，每年是會多一些費用和申報手續。"],["But to chase US money, it's worth it.","但為了爭取美國資金，這很值得。"],["Talk to a real lawyer before you set this up.","在著手設立之前，請先找一位真正的律師談談。"],["Get the structure right early, and sleep better later.","趁早把架構弄對，之後你會睡得比較安穩。"]]},{"title":"Splitting Equity With Your Cofounder","lines":[["So you found a cofounder. Now comes the awkward part.","你找到共同創辦人了，接下來是尷尬的部分。"],["How do you split the equity between the two of you?","你們兩個人要怎麼分股權？"],["A lot of people just say, let's do fifty-fifty.","很多人會直接說，那就一人一半吧。"],["But sometimes one person did way more early on.","但有時候，其中一個人早期做得多很多。"],["Maybe they had the idea and built the first version.","可能是他想出點子，又做出了第一個版本。"],["That's when people start talking about a seventy-thirty split.","這時候大家就會開始聊七三分的做法。"],["Honestly, there's no magic number that's always right.","老實說，沒有一個永遠正確的神奇數字。"],["Just ask yourself, will this still feel fair in five years?","就問問自己，五年後這樣還會覺得公平嗎？"],["And please, always put vesting on the table.","還有拜託，一定要把股權分期拿出來談。"],["Vesting means you earn your shares over time, usually four years.","股權分期的意思是，你的股份隨時間慢慢拿到，通常是四年。"],["It protects everyone if someone leaves early.","如果有人提早離開，這能保護到每一個人。"],["The split is about the future, not just today's work.","分股權看的是未來，不只是今天的付出。"],["Talk it through early, write it down, and move on.","早點談清楚，白紙黑字寫下來，然後繼續往前走。"]]},{"title":"Talking to Investors at a Party","lines":[["Okay, you're at a startup party, and an investor is right there.","好，你在一場新創派對上，投資人就在你旁邊。"],["Your heart's racing, and your mind goes blank.","你心跳加速，腦袋一片空白。"],["First thing, relax. This is just a chat, not a pitch.","第一件事，放輕鬆。這只是閒聊，不是正式提案。"],["You don't need to sell anything in the first minute.","你不需要在第一分鐘就推銷任何東西。"],["Just start simple. Hey, how's your night going?","簡單開場就好。嘿，你今晚過得還好嗎？"],["If they ask what you do, keep it to one clear line.","如果他們問你在做什麼，用一句清楚的話講完。"],["We help people make real friends through reading together.","我們幫助人們透過一起讀書，交到真正的朋友。"],["That's your one-liner. Short, warm, easy to remember.","這就是你的一句話介紹。簡短、溫暖、好記。"],["Then be curious about them, not just yourself.","接著對他們保持好奇，不要只顧著講自己。"],["Ask what kind of startups they get excited about.","問問他們對哪一類的新創會感到興奮。"],["If it clicks, just say, can I follow up by email?","如果聊得來，就說，我可以寄信跟你後續聯絡嗎？"],["That's it. No hard sell, no pressure.","就這樣。不用硬推，也不用有壓力。"],["People back founders they like, so just be real.","投資人會支持他們喜歡的創辦人，所以做自己就好。"]]},{"title":"The Daily Standup at a Startup","lines":[["Every morning at our startup, we have a standup.","在我們的新創，每天早上都有一個晨會。"],["It's a quick team meeting, usually under fifteen minutes.","這是一個快速的團隊會議，通常不到十五分鐘。"],["The whole point is to stay short and stay focused.","重點就是保持簡短、保持專注。"],["Each person answers three simple questions.","每個人回答三個簡單的問題。"],["What did I do yesterday?","我昨天做了什麼？"],["What am I working on today?","我今天要做什麼？"],["And is anything blocking me?","還有，有沒有什麼事卡住我了？"],["A blocker just means something's stopping your progress.","卡住的意思就是，有東西擋住了你的進度。"],["Maybe you're waiting on a design or a code review.","可能你在等一個設計，或是等別人幫你看程式碼。"],["You say it out loud so the team can help.","你把它說出來，這樣團隊才能幫你。"],["Try not to solve every problem right there.","盡量別在會議上當場解決每一個問題。"],["Just flag it, and talk details after the standup.","先點出來，等晨會結束後再談細節。"],["Done well, it keeps everyone on the same page.","做得好的話，它能讓大家的步調一致。"]]},{"title":"How We Found Product-Market Fit","lines":[["Everyone talks about product-market fit like it's magic.","每個人講到產品市場契合，都好像在講某種魔法。"],["It just means people actually want what you built.","它的意思其實就是，人們真的想要你做的東西。"],["For a long time, we didn't have it, and you can feel that.","有很長一段時間我們沒有，而那種感覺你是知道的。"],["You push hard, but users sign up and then disappear.","你拼命推，但用戶註冊完就消失了。"],["So we kept talking to our users, really listening.","於是我們持續跟用戶聊，認真地聆聽。"],["And one thing kept coming up again and again.","有一件事一再被提起。"],["They didn't want another dating app. They wanted real connection.","他們不想要又一個交友軟體，他們想要真實的連結。"],["So we leaned into reading together, and something changed.","於是我們把重心放到一起讀書上，事情就變了。"],["People started coming back on their own, without us pushing.","用戶開始自己回來，不需要我們去推。"],["That's the feeling. The product starts to pull users in.","那就是那種感覺。產品開始把用戶拉進來。"],["Retention went up, and people told their friends.","留存率上升了，而且大家會告訴他們的朋友。"],["Fit isn't a finish line you cross once.","契合不是一條你跨過一次就結束的終點線。"],["It's the moment the market starts pulling, not you pushing.","它是市場開始拉、而不是你在推的那一刻。"]]},{"title":"Answering a Tough Question From an Investor","lines":[["At some point in a pitch, an investor will hit you hard.","在提案的某個時刻，投資人會狠狠考你一下。"],["They might ask, what stops a big company from copying you?","他們可能會問，有什麼能阻止大公司抄你？"],["Your stomach drops, and that's totally normal.","你會心頭一沉，這完全正常。"],["The worst thing you can do is panic and ramble.","你最糟的反應，就是慌張然後講個沒完。"],["So take a breath. It's okay to pause for a second.","所以深呼吸一下。停頓一秒鐘是沒關係的。"],["A tough question usually means they're actually interested.","一個尖銳的問題，通常代表他們其實有興趣。"],["Answer the real question, and don't dodge it.","回答真正被問到的問題，別閃躲。"],["If it's a real risk, be honest, and say how you handle it.","如果那真的是個風險，就誠實說，再講你怎麼應對。"],["Big players are slow, and our users come for the community.","大公司行動慢，而我們的用戶是為了社群而來。"],["That community is our moat, and a moat is hard to copy.","那個社群就是我們的護城河，而護城河很難被抄走。"],["If you don't know something, just say you'll follow up.","如果有什麼你不知道，就說你會後續再回覆。"],["Investors trust founders who stay calm under pressure.","投資人信任那些壓力下還能保持冷靜的創辦人。"],["It's not about the perfect answer. It's about how you think.","重點不是完美的答案，而是你思考的方式。"]]}];


/* ==== Listening pack 2 (more) ==== */
LISTEN.push(...[{"title":"Cap Table, Explained Without the Jargon","lines":[["Today, let's talk about your cap table.","今天，我們來聊聊你的「股權結構表」。"],["It sounds scary, but it's actually simple.","聽起來很嚇人，但其實很單純。"],["A cap table just shows who owns your company.","股權結構表就是顯示「誰擁有你的公司」。"],["It lists every shareholder and their slice.","它列出每一位股東，以及他們持有的那一塊。"],["You're on it. Your cofounder's on it.","你在上面，你的共同創辦人也在上面。"],["Your investors and your option pool, too.","你的投資人，還有你的選擇權池，也都在上面。"],["Each row says how many shares they hold.","每一列會寫出他們持有多少股。"],["And what percent of the company that is.","以及那相當於公司的百分之幾。"],["Early on, just keep it in a clean spreadsheet.","創業初期，用一份乾淨的試算表記著就好。"],["Later, tools like Carta keep it tidy for you.","之後，像 Carta 這類工具會幫你整理得井井有條。"],["Every time you raise money, the table shifts.","每一次你募資，這張表就會跟著變動。"],["Your percent drops a little. That's normal.","你的持股比例會稍微下降，這很正常。"],["The trick is knowing your numbers cold.","關鍵在於，你要把自己的數字記得滾瓜爛熟。"],["Because every investor will ask to see it.","因為每一位投資人，都會要求看這張表。"]]},{"title":"Pre-Money vs Post-Money, With a Simple Number Example","lines":[["Okay, pre-money and post-money.","好，「投資前估值」和「投資後估值」。"],["Two words that confuse almost everyone.","這兩個詞，幾乎讓所有人都很困惑。"],["Let's clear it up with one simple example.","我們用一個簡單的例子把它講清楚。"],["Pre-money is your value before the new money.","投資前估值，是新資金進來「之前」你公司的價值。"],["Post-money is the value right after it lands.","投資後估值，是那筆錢進來「之後」的價值。"],["Say your pre-money valuation is four million.","假設你的投資前估值是四百萬。"],["An investor puts in one million dollars.","一位投資人投入一百萬美元。"],["Now your post-money is five million.","現在你的投資後估值是五百萬。"],["You just add the two numbers together.","你就是把這兩個數字加起來。"],["So that investor now owns one fifth of you.","所以那位投資人現在持有你公司的五分之一。"],["One million out of five is twenty percent.","五百萬裡的一百萬，就是百分之二十。"],["Here's the part founders miss.","接下來是創辦人常常忽略的地方。"],["Investors love quoting the pre-money number.","投資人很愛報「投資前」的那個數字。"],["But your dilution is decided by post-money.","但真正決定你被稀釋多少的，是投資後估值。"],["So always ask, is that pre or post?","所以一定要問，那是投資前還是投資後？"],["That one question saves you a lot of equity.","光是這一個問題，就能幫你保住不少股權。"]]},{"title":"What Investors Really Mean by Traction","lines":[["Every investor will ask, so what's your traction?","每一位投資人都會問，那你的「成長動能」如何？"],["And honestly, traction is a fuzzy word.","老實說，「traction」是一個很模糊的詞。"],["But what they really mean is simple.","但他們真正想問的，其實很單純。"],["Is anyone actually using and paying for this?","到底有沒有人在真正使用，而且願意付錢？"],["Traction is proof that people want your product.","成長動能，就是「有人想要你產品」的證據。"],["It's not your big dreams. It's the evidence.","它不是你遠大的夢想，而是實際的證據。"],["Growing users, growing revenue, people coming back.","用戶在成長、營收在成長、人們一再回流。"],["That last one, retention, matters the most.","最後那一項，留存率，是最重要的。"],["Anyone can buy a spike of signups.","任何人都能花錢買到一波註冊高峰。"],["But people staying? That's hard to fake.","但人們願意留下來？這很難造假。"],["Even small numbers count if they're climbing.","就算數字很小，只要它在往上爬，就算數。"],["Twenty percent growth week over week is strong.","每週成長百分之二十，就是很強的訊號。"],["So don't pitch hopes. Show the real curve.","所以別只談願景，把真實的成長曲線拿出來。"],["A small line going up beats a big promise.","一條往上走的小曲線，勝過一個很大的承諾。"]]},{"title":"Liquidation Preference: The Clause Founders Miss","lines":[["Let's talk about a clause that quietly bites founders.","我們來聊一個會悄悄反咬創辦人的條款。"],["It's called the liquidation preference.","它叫做「清算優先權」。"],["It decides who gets paid first when you sell.","它決定了公司被賣掉時，誰先拿到錢。"],["Investors usually get their money back before you.","投資人通常會比你「先」拿回他們的本金。"],["The standard today is one times, non-participating.","現在的標準是「一倍、非參與型」。"],["One times just means they get their money back.","一倍的意思是，他們就是拿回原本投的錢。"],["Non-participating means they pick one, not both.","非參與型是指，他們只能二選一，不能兩個都拿。"],["They take their money back, or take their share.","他們拿回本金，或是拿自己的股份。"],["Whichever is bigger. But never both.","哪個比較多就拿哪個，但絕不會兩個都拿。"],["Now watch out for the word participating.","要特別小心「參與型」這個詞。"],["That means they get their money back, plus their share.","那代表他們先拿回本金，「再加上」自己的股份。"],["On a small exit, that can leave you almost nothing.","在一場金額不大的出場裡，那可能讓你幾乎一無所有。"],["And avoid anything above one times. That's a red flag.","也要避開高於一倍的條件，那是一個警訊。"],["So read this clause slowly, every single time.","所以這個條款，每一次都要慢慢讀。"],["It's the line that decides your payday.","它就是決定你最後能拿多少的那一行字。"]]},{"title":"Option Pools and Why They Dilute You","lines":[["Today, let's talk about your option pool.","今天，我們來聊聊你的「選擇權池」。"],["It's how you pay your early team.","它是你用來酬庸早期團隊的方式。"],["An option pool is shares set aside for employees.","選擇權池，是預留給員工的一批股份。"],["Your first engineers and hires get a piece.","你最早的工程師和員工，都能分到一塊。"],["It lets you offer equity instead of big salaries.","它讓你能用股權，來取代高薪。"],["That's powerful when cash is tight.","在現金吃緊的時候，這非常有力。"],["But here's the catch nobody warns you about.","但有一個陷阱，沒人會提醒你。"],["Creating that pool dilutes you, the founder.","創立這個池子，會稀釋到你這位創辦人。"],["Those shares come out of your slice, not theirs.","那些股份是從你的那一塊出，而不是投資人的。"],["Investors often want the pool set before they invest.","投資人常常要求，在投資「之前」就先設好池子。"],["And they want it priced into the pre-money.","而且他們希望把它算進投資前估值裡。"],["That quietly lowers your real valuation.","這會悄悄拉低你真正的估值。"],["So negotiate the pool size carefully.","所以池子的大小，要好好談。"],["Ask for what you'll actually use, nothing more.","只要你真正會用到的份量，多一分都不要。"]]},{"title":"Down Rounds and Anti-Dilution, Without the Panic","lines":[["Okay, today let's talk about something that sounds scary.","好，今天我們來聊一個聽起來很可怕的東西。"],["A down round. But really, it's just part of startup life.","下一輪估值變低。但說真的，這只是新創世界的常態。"],["A down round means you raise at a lower valuation than before.","下一輪估值變低，意思是你這次募資的估值，比上一輪還低。"],["Maybe the market cooled. Maybe your growth slowed for a while.","也許市場變冷了，也許你的成長有一陣子慢了下來。"],["It happens to good companies, not just struggling ones.","這也會發生在好公司身上，不是只有撐得辛苦的公司才會遇到。"],["Now, here's where anti-dilution comes in.","好，這時候就要講到反稀釋條款了。"],["Early investors often have a clause that protects their stake.","早期投資人通常會有一個條款，用來保護他們的持股比例。"],["If you raise lower, their old shares get repriced a bit.","如果你用更低的估值募資，他們手上的舊股份會被重新調整一點。"],["Most deals use something called broad-based weighted average.","大多數的交易，會用一種叫做廣基加權平均的方式來算。"],["That's the founder-friendly kind, so don't be too scared of it.","那是對創辦人比較友善的版本，所以你不用太害怕它。"],["The harsh version, full ratchet, can really hurt your ownership.","比較嚴苛的版本叫做完全棘輪，真的會大大傷到你的持股。"],["So when you sign your term sheet, just check which one it is.","所以你在簽投資條件書的時候，記得確認用的是哪一種。"],["A down round isn't the end. It's a chapter, not the whole book.","估值變低不是結束，那只是一個章節，不是整本書。"],["Keep building, keep talking to users, and the story goes on.","繼續打造產品，繼續跟用戶聊，故事就會一直走下去。"]]},{"title":"What a Term Sheet Actually Says","lines":[["So your investor sends over a term sheet. Now what?","所以投資人寄了一份投資條件書給你，然後呢？"],["Think of it as a summary of the deal, before the long contracts.","你可以把它想成交易的摘要，在那些落落長的正式合約之前。"],["It's usually short, just a page or two, which is nice.","它通常很短，大概一兩頁而已，這點還滿好的。"],["Most of it is non-binding, except a couple of small parts.","它大部分內容沒有法律約束力，只有少數幾個小地方有。"],["First, it tells you the valuation and how much they invest.","首先，它會告訴你估值，還有他們要投多少錢。"],["There's pre-money and post-money. Always ask which one.","估值分投資前跟投資後，你一定要問清楚是哪一種。"],["Then it covers the option pool for future hires.","接著它會講到選擇權池，那是留給未來要招募的員工的。"],["Watch this part. It can quietly lower your real valuation.","這部分要看仔細，因為它可能悄悄拉低你實際拿到的估值。"],["It also lists liquidation preference, who gets paid first.","它還會列出清算優先權，也就是公司賣掉時誰先拿到錢。"],["Aim for one times, non-participating. That's the clean version.","盡量爭取一倍、不參與分配，那是最乾淨的版本。"],["And it covers board seats and voting rights too.","它也會講到董事會席次，還有投票權的安排。"],["Honestly, this is the moment to bring in a good lawyer.","老實說，這就是該找一位好律師進來幫忙的時刻。"],["A term sheet isn't just numbers. It shapes how you work together.","投資條件書不只是數字，它會決定你們未來怎麼合作。"],["Read it slowly, ask questions, and never sign in a rush.","慢慢讀，多問問題，千萬不要急著簽下去。"]]},{"title":"How VC Funds Actually Make Money","lines":[["Have you ever wondered how a VC fund makes money?","你有沒有想過，創投基金到底是怎麼賺錢的？"],["It really helps to understand this before you raise.","在你開始募資之前，先搞懂這件事會很有幫助。"],["A VC firm usually doesn't invest its own money.","創投公司通常不是拿自己的錢去投資。"],["They raise a fund from other people called LPs.","他們會跟另一群人募一筆基金，那些人叫做有限合夥人。"],["LPs are pension funds, universities, big family offices.","有限合夥人可能是退休基金、大學，或大型的家族辦公室。"],["The VCs who run the fund are the GPs, the general partners.","實際操盤那筆基金的創投人，叫做普通合夥人。"],["The GPs charge a management fee, often about two percent a year.","普通合夥人會收管理費，通常大概是每年百分之二。"],["That fee keeps the lights on and pays the team.","那筆費用是用來維持營運，還有支付團隊薪水的。"],["But the real prize is something called carry.","但真正的大獎，是一個叫做附帶權益的東西。"],["Carry is usually twenty percent of the fund's profit.","附帶權益通常是基金獲利的百分之二十。"],["So when your startup wins big, the GPs win big too.","所以當你的新創大成功，普通合夥人也會跟著賺很多。"],["That's why they care so much about huge outcomes.","這就是為什麼他們特別在意能不能大成功。"],["Knowing this helps you pitch. They need a few giant wins.","懂這個對你提案很有幫助，他們需要的是少數幾個超大成功。"],["So show them why your company could be one of those.","所以你要讓他們看到，你的公司有機會成為其中之一。"]]},{"title":"Negotiating Your Term Sheet Without Burning Bridges","lines":[["Let's talk about negotiating, but the kind that keeps friends.","我們來聊談判，但是那種還能保住好關係的談判。"],["A term sheet is a starting point, not a final answer.","投資條件書是一個起點，不是最後的定案。"],["It's totally normal to push back on a few things.","針對其中幾項條件提出你的想法，是非常正常的。"],["The trick is knowing what really matters to you.","關鍵在於，你要清楚什麼對你來說真的重要。"],["Don't fight every line. Pick two or three big ones.","不要每一條都要爭，挑出兩三個最重要的就好。"],["Valuation matters, but so do control and clean terms.","估值很重要，但控制權跟乾淨的條款也一樣重要。"],["Always explain your reasoning, not just your ask.","永遠要解釋你的理由，而不是只丟出你的要求。"],["Say, this clause worries me because of the next round.","你可以說，這個條款讓我擔心，因為它會影響到下一輪。"],["Remember, this investor might sit on your board for years.","記得，這位投資人未來可能會在你董事會待上好幾年。"],["You're not buying a car. You're starting a long relationship.","這不是在買一台車，而是在展開一段長久的關係。"],["Stay warm, stay calm, and never make it personal.","保持友善，保持冷靜，而且絕對不要變成針對個人。"],["If you have another offer, you can mention it gently.","如果你手上有另一個提案，你可以委婉地提一下。"],["Leverage is real, but kindness goes further in this world.","籌碼是真實存在的，但在這個圈子，善意能帶你走得更遠。"],["Close the deal, shake hands, and build together.","把交易談成，握個手，然後一起開始打造公司吧。"]]},{"title":"How to Say No to an Investor, Gracefully","lines":[["Here's a skill nobody teaches you, saying no to an investor.","有一個沒人會教你的技能，就是怎麼對投資人說不。"],["Sometimes the money is there, but the fit just isn't right.","有時候錢就在那裡，但就是感覺彼此不太合適。"],["Maybe the terms are too aggressive, or the vibe feels off.","也許是條件太強勢，也許是相處起來的感覺怪怪的。"],["Saying no is allowed, and doing it well is a superpower.","你是可以拒絕的，而且把它做得漂亮，是一種超能力。"],["First, reply quickly. Don't leave them hanging for weeks.","首先，要盡快回覆，不要讓對方苦等好幾個禮拜。"],["Be honest, but you don't have to share every reason.","要誠實，但你不需要把每一個理由都講出來。"],["You can simply say, we decided to go a different direction.","你可以簡單地說，我們決定往一個不同的方向走。"],["Always thank them for their time and their interest.","永遠要感謝他們花的時間，還有對你們的興趣。"],["The startup world is small, and people remember how you act.","新創圈很小，大家會記得你當時是怎麼對待別人的。"],["An investor you pass on today might help you next year.","你今天婉拒的投資人，明年也許就會幫上你的忙。"],["So keep the door open, even when the answer is no.","所以就算答案是不，也要留一扇門。"],["You can say, I'd love to stay in touch as we grow.","你可以說，未來我們成長的路上，很希望能保持聯絡。"],["A graceful no protects your reputation for years.","一個漂亮的拒絕，能在未來好幾年保護你的好名聲。"],["Be kind, be clear, and move on with a clean heart.","保持善意，把話講清楚，然後帶著坦然的心繼續往前走。"]]},{"title":"CAC and LTV: Are You Actually Making Money?","lines":[["Okay, let's talk about two numbers I love.","好，我們來聊兩個我超愛的數字。"],["CAC means customer acquisition cost.","CAC 就是「取得一位顧客的成本」。"],["It's what you spend to win one new customer.","它是你為了贏得一位新顧客所花的錢。"],["Think ads, sales people, all of it.","想想廣告、業務人力，全部加起來。"],["LTV is lifetime value, the other side.","LTV 是「顧客終身價值」，是另一面。"],["It's the total money one customer brings you.","它是一位顧客一輩子帶給你的總收入。"],["Here's the magic ratio everyone watches.","這裡有一個大家都在看的神奇比例。"],["Investors want LTV at least three times CAC.","投資人希望 LTV 至少是 CAC 的三倍。"],["Below that, you're buying customers at a loss.","低於這個，你就是賠錢在買顧客。"],["Above that, growth pays for itself.","高於這個，成長才會自己養活自己。"],["One more thing: watch your payback period.","還有一件事：注意你的回本期。"],["That's how many months to earn back the CAC.","也就是要花幾個月才賺回那筆成本。"],["Under twelve months is a healthy sign.","少於十二個月，是個健康的訊號。"],["So before you scale ads, check these first.","所以在加碼廣告之前，先看這幾個數字。"]]},{"title":"The Rule of 40 and Metrics Investors Love","lines":[["Have you heard of the Rule of 40?","你聽過「40 法則」嗎？"],["It's a quick gut check for software startups.","它是軟體新創一個很快的直覺檢查。"],["Take your growth rate and your profit margin.","拿你的成長率和利潤率。"],["Add them up, and aim for forty or more.","兩個相加，目標是四十或以上。"],["So fast growth can excuse some losses.","所以成長很快，就能讓一些虧損被原諒。"],["And being profitable can excuse slower growth.","而有獲利，也能彌補成長比較慢這件事。"],["It's a balance between speed and discipline.","它是在速度和紀律之間取得平衡。"],["Investors love it because it's so simple.","投資人愛它，因為它非常簡單。"],["One number tells them if you're sustainable.","一個數字就告訴他們你能不能長久走下去。"],["Now, it really fits later stage companies.","不過，它比較適合中後期的公司。"],["At seed stage, nobody expects you to hit it.","在種子輪階段，沒人期待你達標。"],["Still, it's a good habit to track early.","但早點開始追蹤，是個好習慣。"],["It keeps you honest about real efficiency.","它會讓你對真正的效率保持誠實。"],["Try the math on your own startup tonight.","今晚就拿你自己的新創算算看吧。"]]},{"title":"Writing Your Monthly Investor Update","lines":[["Let's talk about your monthly investor update.","我們來聊聊你每個月給投資人的更新信。"],["A lot of founders skip these, and that's a mistake.","很多創辦人會跳過這件事，這是個錯誤。"],["A short email each month keeps investors close.","每個月一封短信，能讓投資人跟你保持親近。"],["Start with the highlights, your wins this month.","先從亮點開始，也就是你這個月的勝利。"],["Then be honest about the lowlights too.","然後也要誠實地講講低潮和不順。"],["Trust me, investors respect honesty here.","相信我，投資人在這裡很尊重誠實。"],["Share two or three key metrics every time.","每次都分享兩到三個關鍵指標。"],["Things like revenue, growth, and cash in the bank.","像是營收、成長，還有銀行裡的現金。"],["Always mention your runway in months.","永遠要提到你還剩幾個月的營運資金。"],["And end with a clear ask for help.","最後用一個明確的求助來收尾。"],["Maybe you need a hire, or a warm intro.","也許你需要一個人才，或是一個熟人引薦。"],["Keep the whole thing under one screen.","整封信控制在一個畫面就看得完。"],["Consistency matters more than being perfect.","持續寄出，比寫得完美更重要。"],["Send it on the same day each month.","每個月固定同一天寄出。"]]},{"title":"Hiring Your First Employee","lines":[["So you're about to hire your first employee.","所以你準備要請第一位員工了。"],["That's a huge milestone, congrats.","這是個很大的里程碑，恭喜你。"],["But take a breath, this hire really matters.","不過先深呼吸，這個人選真的很關鍵。"],["Your first hire shapes your whole culture.","你的第一位員工會形塑整個公司的文化。"],["Hire for the gap you can't cover yourself.","請一個能補上你自己補不了的缺口的人。"],["Look for someone scrappy who likes ambiguity.","找一個拚勁十足、喜歡模糊地帶的人。"],["Early stage is messy, and that's normal.","早期就是一團混亂，這很正常。"],["Be upfront about the long hours and the risk.","要坦白講清楚工時很長、風險也不小。"],["On pay, startups trade salary for equity.","在薪酬上，新創用股權換取較低的現金薪水。"],["Equity means they own a small slice of the company.","股權就是他們擁有公司一小塊的所有權。"],["A common first-hire grant is around one percent.","第一位員工常見的股權，大約落在百分之一上下。"],["And that equity vests over four years.","而且那股權會分四年慢慢給滿。"],["Always check references before you say yes.","在你點頭之前，一定要查推薦人。"],["Hire slow, but once you're sure, move fast.","請人要慢，但一旦確定，就要動作快。"]]},{"title":"Following Up After an Investor Meeting","lines":[["You just walked out of an investor meeting.","你剛走出一場跟投資人的會議。"],["Don't relax yet, the follow-up is huge.","先別放鬆，後續追蹤超級重要。"],["Send a thank-you email within a day.","在一天內寄出一封感謝信。"],["Keep it short, warm, and to the point.","保持簡短、溫暖，而且切中重點。"],["Recap the one thing they got most excited about.","重述一下他們最感興趣的那一個點。"],["Then answer any question you fumbled in the room.","接著補答你在會議裡沒答好的問題。"],["If they asked for data, attach it right here.","如果他們要資料，就在這封信附上。"],["This is your chance to look organized.","這是你展現自己很有條理的機會。"],["Always suggest a clear next step.","永遠要提出一個明確的下一步。"],["Maybe a follow-up call, or a product demo.","也許是再約一通電話，或一場產品展示。"],["Silence is normal, so don't panic too soon.","沒回音很正常，所以別太快慌張。"],["A polite nudge after a week is totally fine.","過了一週禮貌地提醒一下，完全沒問題。"],["Keep them warm with short progress updates.","用簡短的進度更新，讓他們對你保持熱度。"],["Fundraising is a relationship, not one meeting.","募資是一段關係，不是單一場會議。"]]}]);

VOCAB.push(...[["hash out","phrasal verb","討論細節直到談攏","用在會議或對話裡，指雙方把一件還沒定案的事反覆討論、敲定細節，常帶有要花點力氣才能談好的意味。","Let's hash out the pricing before we send the proposal.","everyday"],["iron out","phrasal verb","把問題或分歧解決掉","指把流程、合約或計畫裡卡住的小問題、不一致的地方一一處理掉，讓事情變順。","We still need to iron out a few details in the contract.","everyday"],["run something by someone","phrasal verb","把想法先講給某人聽、徵詢意見","在正式決定前，先把方案或內容講給對方聽，看看對方怎麼想或有沒有問題，是很常見的職場禮貌說法。","Can I run this email by you before I send it to the investor?","everyday"],["give someone a heads-up","phrase","事先提醒、先知會一聲","指提前告訴對方某件事要發生，讓他有心理準備，語氣輕鬆友善，比正式通知更口語。","Just a heads-up, the client is joining the call ten minutes early.","everyday"],["drop the ball","phrase","出包、把該做的事漏掉搞砸","指因為疏忽而沒做好原本負責的事，導致事情出狀況，語氣帶有自責或指出失誤的意味。","I totally dropped the ball on that follow-up email, sorry.","everyday"],["play it by ear","phrase","看情況隨機應變、不先定死","指不事先做硬性安排，等實際情況發生再決定怎麼做，常用於行程或計畫還不確定時。","We don't have a fixed agenda, let's just play it by ear.","everyday"],["in the weeds","phrase","陷在繁瑣細節裡、忙到喘不過氣","指人深陷在太多瑣碎細節或工作量中，看不到全局，也可指餐廳廚房忙翻的狀態。","I'm a bit in the weeds right now, can we talk this afternoon?","everyday"],["take a rain check","phrase","這次先婉拒、改天再約","禮貌地推掉當下的邀約，但表示有意願下次再參加，語氣友善不失禮。","I'll have to take a rain check on lunch, but let's do it next week.","everyday"],["down the road","phrase","未來某個時候、之後","指在將來的某個時間點，而非現在，常用來談以後可能發生或要處理的事。","We can add that feature down the road, let's ship the basics first.","everyday"],["on my radar","phrase","在我的關注範圍內、有注意到","指某件事自己已經知道並在留意中，常用來回應對方提醒、表示不用擔心會忘。","Don't worry, that issue is on my radar, I'll get to it tomorrow.","everyday"],["swamped","adjective","忙翻了、被工作淹沒","形容手上事情多到忙不過來，比 busy 更強烈，是職場很日常的抱怨用語。","I'm completely swamped this week, can we push the meeting?","everyday"],["ping","verb","傳訊息、敲一下某人","指用 Slack、簡訊等快速傳個訊息找人，比 message 更輕快口語，科技業特別常用。","I'll ping you on Slack once the doc is ready.","everyday"],["keep me posted","phrase","有進展隨時跟我說","請對方持續更新狀況、有新消息就告知，是請人保持聯繫回報的標準說法。","Sounds good, keep me posted on how the demo goes.","everyday"],["my two cents","phrase","我的一點淺見、個人意見","在發表意見前後謙虛地說一句，表示這只是自己的看法、僅供參考，語氣客氣。","Just my two cents, but I think we should test it with users first.","everyday"],["a long shot","phrase","成功機率很低的嘗試、賭一把","指成功希望不大、但還是值得一試的事，常用在問人脈、申請、或大膽提案時。","It's a long shot, but could you introduce me to that investor?","everyday"],["call it a day","phrase","今天就到這、收工","指決定停下手邊工作、結束今天的進度，語氣輕鬆，常在傍晚或事情告一段落時說。","We've done enough for now, let's call it a day.","everyday"],["heads-down","phrase","埋頭專心做事、不被打擾","指進入專注模式埋頭工作，常用來說自己接下來要專心、暫時不回訊息。","I'm going heads-down on the deck for the next two hours.","everyday"],["snag","noun","小障礙、卡關的小問題","指過程中突然冒出來的小麻煩或阻礙，通常不嚴重但會拖慢進度，常說 hit a snag。","We hit a snag with the payment integration, but it's nearly fixed.","everyday"],["workaround","noun","變通辦法、暫時繞過問題的方法","指不去根本解決問題，而是想個替代方式先把事情完成，工程和產品討論很常用。","There's no fix yet, but I found a workaround for now.","everyday"],["ramp up","phrasal verb","加速擴大、上手到全速","指規模、產量或新人上手的速度逐步加快，常說 ramp up，也指爬升期。","It usually takes a new hire a month to fully ramp up.","everyday"],["table something","verb","暫時擱置、之後再談","指把一個議題先放著、這次不討論，留到以後再處理，會議中很常用來控制時間。","Let's table that discussion and come back to it next week.","everyday"],["a tall order","phrase","很難達成的要求、強人所難","指對方提出的要求難度很高、不容易做到，語氣帶點委婉提醒這事不簡單。","Doubling revenue in three months is a pretty tall order.","everyday"],["hold the fort","phrase","暫時頂著、幫忙看著局面","指某人不在時，由你暫時撐住、處理事情、維持運作，語氣親切常見於同事互相支援。","Can you hold the fort while I'm out at the meeting?","everyday"],["a quick turnaround","phrase","很快交件、短時間內完成","指從接到任務到交出成果之間的時間很短，常用在趕件、急單或請人盡快回覆時。","Sorry for the quick turnaround, but can you review this by noon?","everyday"],["give or take","phrase","上下、大約誤差範圍內","接在數字後面，表示這個數字大概差不多、可能多一點少一點，用於估算時程或金額。","It'll take about two weeks, give or take a few days.","everyday"],["bridge to nowhere","n.","無處可去的過橋輪","一輪只為延命、卻沒有清楚下一步（沒有增長、沒有新領投方）的過橋融資，最後往往直接走向倒閉。","\"Don't raise a bridge to nowhere. You'd just buy six more months of the same flat numbers.\"","fund"],["party round","n.","派對輪","一輪由很多小額天使或基金共同參與、沒有真正領投方主導的融資；好處是估值容易拉高，壞處是沒人會深度幫你。","\"It was a party round, so when things got hard nobody felt responsible for us.\"","fund"],["pro rata","n./adj.","按比例跟投權","既有投資人在後續輪次中，按其持股比例追加投資、以維持持股不被稀釋的權利。","\"They have pro rata rights, so reserve room for them in the Series B.\"","fund"],["recap","n.","資本重組","重整公司股權結構的動作，常見於困難局面，會大幅重設估值與各方持股，老股東通常被嚴重稀釋。","\"The down round came with a full recap that wiped out most of the early angels.\"","fund"],["cram down","n./v.","強壓重組","在艱困融資中，新投資人以極苛刻的條款強行注資，逼老股東與創辦人接受嚴重稀釋，否則公司就會倒閉。","\"It was a cram down. The new lead took half the company and we had no leverage.\"","fund"],["option pool refresh","n.","員工期權池增補","在新一輪融資時擴大員工選擇權池，以便繼續發股給新進與留任員工；通常算進投前估值，等於由創辦人吸收稀釋。","\"The term sheet bakes the option pool refresh into the pre-money, so it's really us paying for it.\"","legal"],["tender offer","n.","公開收購要約","公司或投資人統一向一批員工或股東開出同一價格、買回他們手上股份的安排，讓員工有機會套現。","\"The company ran a tender offer so employees could cash out 20% of their vested shares.\"","fund"],["MFN","n.","最惠待遇條款","Most Favored Nation 的縮寫；保證早期投資人若日後有人拿到更好的條款，自己能自動升級到同樣的條款。","\"Give the first angel an MFN so they're never stuck with worse terms than later checks.\"","legal"],["activation rate","n.","啟用率","新註冊用戶中、完成關鍵首次價值動作（aha moment）的比例；衡量產品讓人上手並感受到價值的能力。","\"Sign-ups look great, but our activation rate is only 18%. Most people never finish setup.\"","metric"],["retention cohort","n.","留存世代群組","按同一時間註冊把用戶分組，再追蹤各組隨時間留存比例的分析方式；用來看產品黏著度是否隨版本改善。","\"Plot it by retention cohort. Each new month's users should stay longer than the last.\"","metric"],["CAC payback","n.","獲客成本回本週期","用一個客戶帶來的毛利、回收當初獲客成本（CAC）所需的月數；越短代表成長越能自我滾動。","\"Our CAC payback is eight months, so we can grow without burning a ton of cash.\"","metric"],["NRR","n.","淨收入留存率","Net Revenue Retention；同一批既有客戶一年後帶來的收入相對於去年的比例，含擴張、續約與流失，超過 100% 代表越養越大。","\"With 130% NRR we'd grow even if we never closed a single new logo.\"","metric"],["gross retention","n.","毛留存率","既有客戶收入在扣除流失與降級後、但不計任何擴張的留存比例；上限是 100%，是衡量漏不漏的底線指標。","\"NRR is flattered by upsells. Look at gross retention to see how leaky the bucket really is.\"","metric"],["bottom-up","adj.","由下而上（採用或估算）","指市場規模或產品採用是從個別使用者或團隊自發採用累積而成，而非由高層統一決策；常與 PLG 並用。","\"It's a bottom-up motion. Individual devs adopt it first, then the company buys later.\"","product"],["top-down","adj.","由上而下（銷售或估算）","指由企業高層或採購統一拍板導入，再向下推行的銷售模式；也指從總市場往下切估市場規模的算法。","\"Enterprise wants a top-down sale, so we need a champion in the C-suite.\"","product"],["go-to-market motion","n.","市場進入打法","公司把產品送到客戶手上、並讓他們付費的整套可重複動作，例如 PLG、業務外撥、社群驅動；常簡稱 GTM motion。","\"We have product-market fit but the wrong go-to-market motion. Sales is too expensive at this price point.\"","pitch"],["lighthouse logo","n.","燈塔級標竿客戶","知名度高、能背書並吸引同類客戶跟進的標誌性客戶；其品牌出現在簡報就能帶來信任。","\"Landing one lighthouse logo in finance opened doors to every other bank.\"","pitch"],["product-led","adj.","產品驅動成長導向","Product-Led Growth 導向；讓產品本身（免費試用、自助上手、病毒擴散）作為主要的獲客與擴張引擎，而非靠業務團隊。","\"We're product-led. Users onboard themselves and upgrade before sales ever calls.\"","product"]]);
READINGS.push(...[{"title":"How to Run a Fundraising Process","body":"Raising money works best when you run it like a process, not a slow trickle. First, build a target list of investors who fund your stage and space. Then start meetings in a tight window so demand stacks up. When firms feel **competition**, they move faster. A short, clean **pitch deck** and a clear ask help a lot. After good first meetings, **partner meetings** come next, then **diligence**, then a **term sheet**. Try to get offers around the same time so you can compare. Founders who drag a raise over many months often look weak, so keep the **momentum** high and stay organized.","gloss":[["competition","競爭"],["pitch deck","募資簡報"],["partner meetings","合夥人會議"],["diligence","盡職調查"],["term sheet","投資條件書"],["momentum","動能、氣勢"]]},{"title":"How to Get a Warm Intro","body":"Cold emails to investors rarely work. A **warm intro** does much better because someone the investor trusts is vouching for you. The best path is through another founder, especially one the firm has already backed. Look at your network and ask, \"Who do I know who knows them?\" When you ask, make it easy. Write a short **forwardable email** that explains what you do in two lines, your traction, and why this investor fits. Always give the connector a clean way to opt out, so it never feels pushy. A good intro is short, specific, and shows real **signal**. Quality of intro beats quantity every time.","gloss":[["warm intro","熟人引薦（經信任的人介紹）"],["vouching for","為你背書"],["backed","投資過、支持過"],["forwardable email","可轉寄的引薦信"],["opt out","選擇退出、婉拒"],["signal","正面訊號"]]},{"title":"What Diligence Actually Checks","body":"After a verbal yes, investors run **diligence** to confirm the story you told. They check your numbers first, so be ready to share real **metrics** like revenue, growth, and churn. They call your customers to ask if they truly love the product. They review your **cap table** to see who owns what, and they check that the company is set up cleanly, usually as a **Delaware C-corp**. They also look at the founders themselves, doing **reference calls** with past coworkers. Surprises here kill deals, so never hide a problem. If you disclose issues early and explain them, you build **trust**, and trust is what closes the round.","gloss":[["diligence","盡職調查"],["metrics","指標、數據"],["cap table","股權結構表"],["Delaware C-corp","德拉瓦州 C 型公司"],["reference calls","背景查核電話"],["trust","信任"]]},{"title":"How to Set Good KPIs and OKRs","body":"Early teams move fast, but without clear goals they drift. Two tools help. A **KPI** is a number you watch all the time, like weekly active users or **monthly recurring revenue**. **OKRs** are bigger, set each quarter. An **objective** is what you want, written in plain words, and the **key results** are the measurable signs that you got there. Good key results are specific, like \"grow paying users from 200 to 500.\" Keep the list short, maybe three objectives, so the team stays **focused**. Review them often and be honest when you miss. The point is not to look busy. The point is to make sure your work moves the metrics that matter.","gloss":[["KPI","關鍵績效指標"],["monthly recurring revenue","每月經常性收入"],["OKRs","目標與關鍵成果"],["objective","目標"],["key results","關鍵成果"],["focused","專注的"]]},{"title":"How to Find Your First Users","body":"Your first users will not come from ads. They come from places where your target people already gather. Go to **online communities**, niche forums, or group chats and join the real conversation. Do not spam. Help people, and mention your product only when it fits. Many strong founders do things that **don't scale** at the start, like emailing strangers one by one or hopping on calls to onboard each user by hand. These first fans give you **honest feedback** and often become your loudest fans. Aim for a small group that truly loves you, not a big group that mildly likes you. Once you have **early adopters**, ask them to refer friends, and growth starts to compound.","gloss":[["online communities","線上社群"],["don't scale","無法規模化的事"],["onboard","引導上手"],["honest feedback","誠實的回饋"],["early adopters","早期採用者"],["compound","複利累積"]]},{"title":"How to Write a One-Page Memo","body":"A **one-page memo** forces you to think clearly. If you cannot explain your company on one page, you do not yet understand it. Start with the **problem**, stated in plain language a stranger would feel. Then your **solution**, and why now is the right moment. Add a few lines on the market size, your traction, the team, and the ask. Cut every word that does not carry weight. Investors read fast, so put the strongest point first. A good memo reads like a clear story, not a list of buzzwords. Many top firms now prefer a short **narrative** over a long deck, because clear writing shows clear thinking, and that is exactly what they are betting on.","gloss":[["one-page memo","一頁式備忘錄"],["problem","問題、痛點"],["solution","解決方案"],["traction","成長動能、實績"],["narrative","敘事、故事"],["buzzwords","流行術語、空話"]]},{"title":"Setting Up a Phone Plan","body":"When I moved here, I needed a phone number fast. I walked into a carrier store and told the rep, \"I'd like to switch to a **prepaid** plan, no contract.\" He asked if I wanted to **port** my old number, but I just got a new one. The hard part was the **deposit**. Without U.S. credit history, some carriers ask for one upfront. I picked a plan with **unlimited** data and **autopay**, which knocked five dollars off the bill. He helped me pop in the **SIM card** and texted me to confirm it worked. Done in twenty minutes.","gloss":[["prepaid","預付的（先付費再使用）"],["port","攜碼移轉（把舊號碼轉到新門號）"],["deposit","押金"],["unlimited","無限制的（吃到飽）"],["autopay","自動扣款"],["SIM card","SIM 卡"]]},{"title":"Chatting With Your Uber Driver","body":"I take a lot of Ubers, and drivers love to chat. One asked, \"So, where are you from **originally**?\" I said Taiwan, and he lit up because he'd visited Taipei. To be safe, I always check the **license plate** before I get in. Then it's easy **small talk**: \"How's your day going?\" or \"Is traffic usually this bad?\" When we arrive, I say, \"Thanks, have a good one,\" and leave a quick **tip** in the app. A solid **rating** matters to drivers, so if the ride was smooth, I give five stars. It keeps the whole thing friendly.","gloss":[["originally","原本地（你本來是哪裡人）"],["license plate","車牌"],["small talk","閒聊"],["tip","小費"],["rating","評分"]]},{"title":"Checking Out at the Supermarket","body":"American supermarkets have their own rhythm at checkout. The cashier usually asks, \"Did you find everything okay?\" Just say, \"Yes, thanks.\" If they ask, \"Do you have a **rewards** card?\" and you don't, type your phone number on the keypad or say, \"No, I'll skip it.\" Watch for items on sale, the **coupon** often applies automatically when you scan your number. At the end they ask, \"Paper or plastic?\" for bags. I usually bring my own to avoid the **surcharge**. Tap your card to pay, grab the **receipt**, and you're out. The **self-checkout** lane is faster if you have just a few things.","gloss":[["rewards","會員回饋（集點優惠）"],["coupon","折價券"],["surcharge","額外費用（加收的費用）"],["receipt","收據"],["self-checkout","自助結帳"]]},{"title":"Sorting Out Chores With Roommates","body":"Living with roommates means you have to talk about chores, awkward as it feels. Early on, I suggested, \"Should we set up a **chore** chart?\" so nobody forgets. We split the **rent** and **utilities** evenly, and I send a quick reminder when a bill is due. The trash is the big one, whoever's turn it is takes it to the **curb** on pickup day. If something bugs me, I keep it light: \"Hey, mind doing your dishes tonight?\" Most issues are small and easy to fix. Being **upfront** early saves a lot of tension later. We've gotten along great so far.","gloss":[["chore","家務雜事"],["rent","房租"],["utilities","水電瓦斯等公用事業費"],["curb","路邊（人行道邊緣）"],["upfront","坦白直接的"]]},{"title":"Returning Something to the Store","body":"Returns in the U.S. are usually painless, which surprised me at first. I bought a jacket that didn't fit, so I brought it back with the tag still on. At the counter I said, \"I'd like to **return** this, it's the wrong size.\" The clerk asked, \"Do you have your **receipt**?\" Luckily I did. She checked their **return policy**, most stores give you thirty days. I asked, \"Can I get a **refund** to my card?\" and she said yes. If I'd lost the receipt, I might only get **store credit** instead. The whole thing took five minutes, no questions asked.","gloss":[["return","退貨"],["receipt","收據"],["return policy","退換貨政策"],["refund","退款"],["store credit","商店購物金（只能在該店消費）"]]},{"title":"Joining a Gym","body":"Signing up for a gym here took a short conversation. The front-desk guy asked, \"Are you looking for a **membership** today?\" I said yes and asked about the monthly **fee**. He walked me through the options: a basic plan, or one with classes included. I made sure to ask, \"Is there a **cancellation** policy?\" because some gyms lock you into a year. This one was **month-to-month**, which I liked. There was a small **sign-up fee**, but he waived it during the promo. He gave me a quick tour, showed me the locker room, and scanned my new card at the gate. Easy.","gloss":[["membership","會員資格"],["fee","費用"],["cancellation","取消（解約）"],["month-to-month","按月計（隨時可停）"],["sign-up fee","入會費"]]}]);
Object.assign(READING_ZH, {"How to Run a Fundraising Process":"募資時，把它當成一個有節奏的流程來跑，效果最好，而不是慢慢零星地談。第一步，列出一份會投資你這個階段、這個領域的投資人名單。接著在一個很集中的時間區間內開始安排會議，讓需求堆疊起來。當投資機構感覺到有競爭時，他們就會動得更快。一份簡短、乾淨的募資簡報，加上清楚的需求金額，會幫助很大。第一輪會議談得好之後，接著是合夥人會議，然後是盡職調查，再來是投資條件書。盡量讓不同的報價落在差不多同一時間，這樣你才能互相比較。把募資拖上好幾個月的創辦人，常常會顯得很弱勢，所以要把動能維持得高一點，並且保持條理分明。","How to Get a Warm Intro":"向投資人發冷郵件很少有用。經由熟人引薦的效果好得多，因為是投資人信任的人在為你背書。最好的路徑是透過另一位創辦人，尤其是這家機構已經投資過的那一位。看看你的人脈，問自己「我認識的人裡，誰認識他們？」當你開口拜託時，要讓對方很好辦事。寫一封簡短、可以直接轉寄的引薦信，用兩行字說明你在做什麼、你的成長數據，以及為什麼這位投資人很適合。永遠要給幫你牽線的人一個體面的婉拒空間，這樣才不會讓人覺得有壓力。一個好的引薦要簡短、具體，並且展現出真正的正面訊號。引薦的品質，每次都勝過數量。","What Diligence Actually Checks":"在口頭答應之後，投資人會進行盡職調查，來確認你說的那一套故事是真的。他們會先查你的數字，所以要準備好分享真實的指標，像是營收、成長率和流失率。他們會打電話給你的客戶，問他們是不是真的愛用這個產品。他們會檢視你的股權結構表，看看誰持有多少股份，並且確認公司架構乾淨，通常是設立成德拉瓦州的 C 型公司。他們也會調查創辦人本身，跟你過去的同事做背景查核電話。在這個階段冒出意外會搞砸交易，所以絕對不要隱瞞問題。如果你早點揭露問題並加以解釋，就能建立信任，而信任正是讓這一輪募資成交的關鍵。","How to Set Good KPIs and OKRs":"早期團隊動得很快，但如果沒有清楚的目標，就會漫無方向地飄。有兩個工具可以幫忙。關鍵績效指標是一個你隨時都在盯著的數字，像是每週活躍用戶數，或是每月經常性收入。目標與關鍵成果則更宏觀，每一季設定一次。目標就是你想要達成的事，用白話寫出來，而關鍵成果則是證明你做到了的可衡量跡象。好的關鍵成果要很具體，像是「把付費用戶從兩百人成長到五百人」。清單要保持精簡，大概三個目標就好，這樣團隊才能維持專注。要常常檢視它們，做不到的時候也要誠實面對。重點不是讓自己看起來很忙，重點是確保你的工作真的有推動那些重要的指標。","How to Find Your First Users":"你的第一批用戶不會是從廣告來的。他們來自那些你的目標族群早就聚集的地方。去那些線上社群、小眾論壇或群組聊天室，加入真正的對話。不要洗版。去幫助別人，只有在真的合適的時候才提到你的產品。許多優秀的創辦人在一開始都會去做一些無法規模化的事，像是一封一封地寫信給陌生人，或是直接打電話親手引導每一位用戶上手。這些第一批粉絲會給你誠實的回饋，而且常常會變成你最熱情的擁護者。要追求一小群真心愛你的人，而不是一大群只是有點喜歡你的人。一旦你有了早期採用者，就請他們推薦朋友，這樣成長就會開始複利累積。","How to Write a One-Page Memo":"一頁式備忘錄會逼著你想清楚。如果你沒辦法用一頁紙說明你的公司，那代表你自己都還沒搞懂它。先從問題開始，用白話寫出來，要讓一個陌生人也能感受到那個痛點。接著是你的解決方案，以及為什麼現在正是對的時機。再加上幾行字談談市場規模、你的成長實績、團隊，以及你的募資需求。把每一個沒有份量的字都刪掉。投資人讀東西很快，所以要把最有力的論點放在最前面。一份好的備忘錄讀起來像一個清楚的故事，而不是一堆空話的清單。現在許多頂尖機構都比較偏好一段簡短的敘事，勝過一份冗長的簡報，因為清楚的文筆代表清楚的思路，而那正是他們要押注的東西。","Setting Up a Phone Plan":"我剛搬來時，急著要一個電話號碼。我走進一家電信門市，跟店員說：「我想辦預付方案，不要綁約。」他問我要不要把舊號碼攜碼過來，但我只是辦了個新的。麻煩的部分是押金。因為沒有美國的信用紀錄，有些電信業者會要求先付一筆押金。我選了一個吃到飽方案，再加自動扣款，帳單因此每月少了五美元。他幫我把 SIM 卡裝進去，還傳了簡訊確認它能用。二十分鐘就搞定了。","Chatting With Your Uber Driver":"我常搭 Uber，司機都很愛聊天。有一位問我：「那你原本是哪裡人？」我說台灣，他眼睛一亮，因為他去過台北。為了安全，我上車前一定會先核對車牌。接著就是輕鬆的閒聊：「今天過得如何？」或是「平常塞車都這麼嚴重嗎？」到站時，我會說：「謝啦，祝你愉快。」然後在 App 裡快速給個小費。評分對司機很重要，所以如果這趟很順，我就給五顆星。這樣整件事都會很友善。","Checking Out at the Supermarket":"美國超市的結帳有自己的一套節奏。收銀員通常會問：「東西都找到了嗎？」回答「有，謝謝」就好。如果他們問：「你有會員卡嗎？」而你沒有，就在鍵盤上輸入手機號碼，或說：「沒有，我跳過。」留意特價的商品，當你輸入號碼時，折價券往往會自動套用。最後他們會問袋子要「紙袋還是塑膠袋？」我通常自己帶袋子，以免被加收費用。感應一下卡片付款，拿了收據，就可以走人了。如果只買幾樣東西，自助結帳的通道會比較快。","Sorting Out Chores With Roommates":"跟室友同住，就得談家務的事，再尷尬也得談。一開始我就提議：「我們要不要弄一張家務分配表？」這樣大家才不會忘。我們平均分攤房租和水電費，帳單到期時我會傳個訊息提醒一下。垃圾是大事，輪到誰，誰就在收垃圾那天把它拿到路邊。如果有什麼讓我不舒服，我會講得輕鬆一點：「欸，今晚方便洗一下你的碗嗎？」大部分問題都很小，也好解決。早一點把話講開，後面能省下很多摩擦。到目前為止我們相處得很好。","Returning Something to the Store":"在美國退貨通常很輕鬆，這一開始讓我蠻意外的。我買了一件不合身的外套，就把吊牌還留著拿回去退。在櫃台我說：「我想退這件，尺寸不對。」店員問：「你有收據嗎？」幸好我有。她查了一下他們的退換貨政策，大部分商店給你三十天。我問：「可以退款到我的卡上嗎？」她說可以。如果我把收據弄丟了，可能就只能拿到商店購物金。整件事花了五分鐘，完全沒被刁難。","Joining a Gym":"在這裡加入健身房只需要一段簡短的對話。櫃台的人問：「你今天是想辦會員嗎？」我說是，並問了月費。他帶我看了各種方案：陽春版，或是含團體課的方案。我特別問了：「有解約規定嗎？」因為有些健身房會把你綁約一年。這家是按月計費的，我很喜歡這點。有一筆小小的入會費，但他在促銷期間幫我免掉了。他帶我快速逛了一圈，介紹了置物間，還在閘門掃了我的新卡。很簡單。"});

/* ---------------- STATE / STORAGE ---------------- */
const KEY="founder_english_v2", DAY=86400000, NEW_PER_DAY=8;
let S = load();
function load(){
  let d; try{ d=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  if(!d) d={};
  d.cards=d.cards||{}; d.streak=d.streak||0; d.lastStudy=d.lastStudy||null;
  d.newToday=d.newToday||{date:null,count:0}; d.reviews=d.reviews||0;
  d.readIdx=d.readIdx||0; d.shadowIdx=d.shadowIdx||0; d.listenIdx=d.listenIdx||0;
  d.writeLog=d.writeLog||{}; d.daily=d.daily||{date:null,review:false,read:false,speak:false,write:false};
  return d;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function todayStr(){const t=new Date();return t.getFullYear()+"-"+(t.getMonth()+1)+"-"+t.getDate();}
function cardState(id){ if(!S.cards[id]) S.cards[id]={due:0,interval:0,ease:2.5,reps:0,seen:false}; return S.cards[id]; }
function resetNewCounter(){const t=todayStr(); if(S.newToday.date!==t) S.newToday={date:t,count:0};}
function resetDaily(){const t=todayStr(); if(S.daily.date!==t) S.daily={date:t,review:false,read:false,speak:false,write:false};}
function setDaily(f){ resetDaily(); S.daily[f]=true; save(); }

function buildQueue(){
  resetNewCounter();
  const now=Date.now(), due=[], fresh=[];
  VOCAB.forEach((v,i)=>{const c=cardState(i); if(c.seen){if(c.due<=now)due.push(i);} else fresh.push(i);});
  const room=Math.max(0,NEW_PER_DAY-S.newToday.count);
  return due.concat(fresh.slice(0,room));
}
function grade(id,g){
  const c=cardState(id), wasNew=!c.seen;
  if(g==="again"){c.reps=0;c.interval=0;c.ease=Math.max(1.3,c.ease-0.2);c.due=Date.now()+5*60000;}
  else{
    if(g==="hard"){c.interval=Math.max(1,Math.round((c.interval||1)*1.2));c.ease=Math.max(1.3,c.ease-0.15);}
    else if(g==="good"){c.interval=c.reps===0?1:c.reps===1?3:Math.round((c.interval||1)*c.ease);}
    else{c.interval=c.reps===0?2:c.reps===1?5:Math.round((c.interval||1)*c.ease*1.3);c.ease=c.ease+0.15;}
    c.reps++; c.due=Date.now()+c.interval*DAY;
  }
  if(wasNew){c.seen=true;resetNewCounter();S.newToday.count++;}
  S.reviews++; markStudied(); setDaily("review"); save();
}
function markStudied(){
  const t=todayStr(); if(S.lastStudy===t) return;
  const y=new Date(Date.now()-DAY), ys=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  S.streak=(S.lastStudy===ys)?S.streak+1:1; S.lastStudy=t;
}
function dueCount(){resetNewCounter();const now=Date.now();let n=0;VOCAB.forEach((v,i)=>{const c=cardState(i);if(c.seen&&c.due<=now)n++;});return n;}
function learnedCount(){let n=0;for(const k in S.cards)if(S.cards[k].seen)n++;return n;}
function newLeftToday(){resetNewCounter();const u=VOCAB.filter((v,i)=>!cardState(i).seen).length;return Math.min(u,Math.max(0,NEW_PER_DAY-S.newToday.count));}

/* ---------------- TTS (offline speech) ---------------- */
let _voice=null;
function pickVoice(){
  const vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];
  _voice = vs.find(v=>/en[-_]US/i.test(v.lang)&&/natural|google|samantha|aaron/i.test(v.name))
        || vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if(window.speechSynthesis){ pickVoice(); window.speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text,rate){
  if(!window.speechSynthesis){ alert("此瀏覽器不支援語音，建議用 Chrome / Edge。"); return; }
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=rate||0.9; if(_voice)u.voice=_voice;
  window.speechSynthesis.speak(u);
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function q(s){return s.replace(/"/g,"&quot;");}

/* ---------------- 錄音對比（需 HTTPS，如 GitHub Pages） ---------------- */
let _rec=null,_chunks=[],_stream=null;
async function toggleRecord(btn,out){
  if(_rec && _rec.state==="recording"){ _rec.stop(); return; }
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||typeof MediaRecorder==="undefined"){
    out.innerHTML='<div class="hint">這個環境不支援錄音（多半是直接開檔 file://）。部署到 GitHub Pages（HTTPS）後就能錄。</div>'; return;
  }
  try{ _stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ out.innerHTML='<div class="hint">沒拿到麥克風權限。請在瀏覽器允許麥克風，或先部署到 HTTPS 再試。</div>'; return; }
  _chunks=[]; _rec=new MediaRecorder(_stream);
  _rec.ondataavailable=e=>{ if(e.data.size>0)_chunks.push(e.data); };
  _rec.onstop=()=>{
    if(_stream){_stream.getTracks().forEach(t=>t.stop());_stream=null;}
    btn.textContent="● 重新錄音";
    if(!_chunks.length){ out.innerHTML='<div class="hint">沒錄到聲音。請確認允許了麥克風、而且是用部署後的 HTTPS 網址（直接開檔 file:// 會被擋）。</div>'; return; }
    const blob=new Blob(_chunks,{type:_rec.mimeType||"audio/webm"}), url=URL.createObjectURL(blob);
    out.innerHTML='<div class="muted" style="font-size:12px;margin-bottom:6px">你的錄音（按播放鍵，跟上面 🔊 範例比語調）：</div><audio controls preload="auto" src="'+url+'" style="width:100%"></audio>';
    markStudied(); setDaily("speak"); save();
  };
  _rec.start(); btn.textContent="⏹ 停止錄音（說完按這）"; out.innerHTML='<div class="hint">錄音中… 唸完再按一次停止。</div>';
}

/* ---- passage TTS with pause / resume (queue by sentence to dodge Chrome's long-utterance cutoff) ---- */
function speakPassage(text){
  if(!window.speechSynthesis){ alert("此瀏覽器不支援語音，建議用 Chrome / Edge。"); return; }
  window.speechSynthesis.cancel();
  const parts = text.match(/[^.!?]+[.!?]*/g) || [text];
  parts.forEach(p=>{ const t=p.trim(); if(!t) return; const u=new SpeechSynthesisUtterance(t); u.lang="en-US"; u.rate=0.92; if(_voice)u.voice=_voice; window.speechSynthesis.speak(u); });
}
function ttsPause(){ if(window.speechSynthesis) window.speechSynthesis.pause(); }
function ttsResume(){ if(window.speechSynthesis) window.speechSynthesis.resume(); }
function ttsStop(){ if(window.speechSynthesis) window.speechSynthesis.cancel(); }

/* ---- free pronunciation check via Web Speech API (no key; needs Chrome/Edge + internet) ---- */
function _norm(s){ return s.toLowerCase().replace(/[^a-z0-9\s']/g," ").replace(/\s+/g," ").trim(); }
function pronCheck(target, out, btn){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ out.innerHTML='<div class="hint">這個瀏覽器不支援發音辨識，請用電腦版 Chrome / Edge，手機用 Android Chrome。</div>'; return; }
  const rec=new SR(); rec.lang="en-US"; rec.interimResults=false; rec.maxAlternatives=1;
  const reset=()=>{ btn.textContent="🎤 測發音（免費）"; };
  btn.textContent="🎤 聽你唸…（請大聲說）";
  out.innerHTML='<div class="hint">請對著麥克風，大聲唸出上面那句英文。</div>';
  rec.onresult=e=>{
    const said=(e.results[0][0].transcript)||"";
    const t=_norm(target).split(" "), set=new Set(_norm(said).split(" "));
    let hit=0; const words=t.map(w=>{ const ok=set.has(w); if(ok)hit++; return {w,ok}; });
    const pct=t.length?Math.round(hit/t.length*100):0;
    const col=pct>=80?"var(--sage-d)":pct>=50?"#c9952f":"var(--red)";
    const whtml=words.map(o=>`<span style="color:${o.ok?'var(--sage-d)':'var(--red)'};font-weight:${o.ok?700:400}">${esc(o.w)}</span>`).join(" ");
    out.innerHTML=`<div style="margin-top:6px"><div style="font-family:var(--mono);font-size:22px;color:${col}">${pct}% 聽得懂</div>`
      +`<div style="margin:8px 0;font-size:16px;line-height:1.7">${whtml}</div>`
      +`<div class="muted" style="font-size:12px">系統聽到：「${esc(said)}」。紅色＝沒被聽出來的字，多半是那幾個音唸得不夠準，針對它們再練幾次。</div></div>`;
    markStudied(); setDaily("speak"); save(); reset();
  };
  rec.onerror=e=>{ out.innerHTML='<div class="hint">沒聽到聲音或麥克風被拒（'+esc(e.error||"")+'）。請允許麥克風、靠近一點，網路要通。</div>'; reset(); };
  rec.onend=()=>{ if(btn.textContent.indexOf("聽你唸")>=0) reset(); };
  try{ rec.start(); }catch(err){ out.innerHTML='<div class="hint">無法啟動辨識，稍候再試。</div>'; reset(); }
}

/* ---- LISTEN: bilingual podcast player (TTS + EN caption + ZH) ---- */
function highlightLine(i){ const els=document.querySelectorAll("#llines .lline"); els.forEach((el,idx)=>el.classList.toggle("on", idx===i)); if(i>=0&&els[i]) els[i].scrollIntoView({block:"nearest"}); }
function playLines(lines, from, single){
  if(!window.speechSynthesis){ alert("此瀏覽器不支援語音，建議用 Chrome / Edge。"); return; }
  window.speechSynthesis.cancel(); highlightLine(-1);
  const end = single ? from+1 : lines.length;
  for(let i=from;i<end;i++){
    const u=new SpeechSynthesisUtterance(lines[i]); u.lang="en-US"; u.rate=0.92; if(_voice)u.voice=_voice;
    u.onstart=(idx=>()=>highlightLine(idx))(i);
    if(i===end-1) u.onend=()=>highlightLine(-1);
    window.speechSynthesis.speak(u);
  }
}

        <p>③ 聽不懂就放慢（YouTube 設定 → 0.75 速）＋重看同段。約 85% 聽得懂最理想。</p>
      </div>
      <a class="btn-ghost" style="display:block;text-align:center;text-decoration:none;margin-top:4px" href="https://www.languagereactor.com/" target="_blank" rel="noopener">裝 Language Reactor（免費）</a>
    </div>
    <div class="card">
      <h2>精選影片 · 點了用 YouTube 開</h2>
      ${VIDEOS.map(v=>`<a class="vidcard" href="${q(v[4])}" target="_blank" rel="noopener" data-watch="1">
          <div class="vt">${esc(v[0])} <span class="lvl">${esc(v[2])}</span></div>
          <div class="vm">${esc(v[1])}　·　${esc(v[3])}</div></a>`).join("")}
      <div class="hint">每天看 20 分就夠。記得開英文字幕、配 Language Reactor。</div>
    </div>`;
  view.querySelectorAll("[data-watch]").forEach(a=>a.addEventListener("click",()=>{ markStudied(); setDaily("read"); save(); }));
}
function learnKnow(){
  document.getElementById("learnBody").innerHTML=KNOWLEDGE.map(k=>`
    <div class="card">
      <h2>${esc(k[0])}</h2>
      <div style="margin-bottom:8px">${k[1].map(t=>`<button class="kterm" data-spk="${q(t)}">🔊 ${esc(t)}</button>`).join("")}</div>
      <div class="kbody">${k[2].split("\n").map(p=>`<p>${esc(p)}</p>`).join("")}</div>
    </div>`).join("")
    + `<p class="muted center" style="font-size:12px;margin-bottom:4px">點術語上的 🔊 聽發音。讀這些也算今天有輸入。</p>`;
  bindSpk();
  markStudied(); setDaily("read"); save();
}

/* ---- SPEAK (shadowing + prompts) ---- */
let shadowReps=0;
function renderSpeak(){
  const s=SHADOW[S.shadowIdx%SHADOW.length];
  view.innerHTML=`
    <div class="card center">
      <div class="muted" style="display:flex;justify-content:space-between">
        <span>跟讀 Shadowing ${(S.shadowIdx%SHADOW.length)+1}/${SHADOW.length}</span><span class="pill">研究最推薦的口說練法</span>
      </div>
      <div class="shadow-sent">${esc(s[0])}</div>
      <div class="shadow-zh">${esc(s[1])}</div>
      <div class="repdots">${[0,1,2,3,4].map(i=>`<span class="${i<shadowReps?'on':''}"></span>`).join("")}</div>
      <div class="row" style="margin-top:6px">
        <button class="btn-ghost" style="flex:1" data-spk="${q(s[0])}">🔊 正常速</button>
        <button class="btn-ghost" style="flex:1" data-spkslow="${q(s[0])}">🐢 慢速</button>
      </div>
      <button class="btn-primary" style="margin-top:10px" id="repeat">我跟著唸了一次 ✓</button>
      <button class="btn-ghost" id="pronBtn" style="width:100%;margin-top:10px">🎤 測發音（免費，唸給它聽）</button>
      <div id="pronOut" style="margin-top:8px"></div>
      <button class="btn-ghost" id="recBtn" style="width:100%;margin-top:10px">● 錄音對比（錄自己 vs 範例）</button>
      <div id="recOut" style="margin-top:10px"></div>
      <div class="hint" style="margin-top:12px">怎麼練：按 🔊 聽 → 立刻模仿語調唸出聲 → 同一句重複 3 到 5 次。想知道準不準就按「測發音」，它會聽你唸、標出沒對上的字。</div>
      ${shadowReps>=3?`<button class="btn-ghost" style="width:100%;margin-top:10px" id="nextS">這句練熟了，下一句 →</button>`:''}
    </div>

    <div class="card">
      <h2>開口回答 · Pushed Output</h2>
      <p class="muted" style="margin:-4px 0 8px">看題目、用英文「說出聲」（不是打字）。逼自己生產語言、找出不會的地方：</p>
      <p style="font-weight:600;font-style:italic">“${esc(PROMPTS[(S.shadowIdx+new Date().getDate())%PROMPTS.length])}”</p>
      <button class="btn-ghost" id="spoke" style="width:100%;margin-top:8px">我說出聲回答了 ✓</button>
      <div class="hint" style="margin-top:10px">「測發音」和「錄音對比」都要在部署後的 HTTPS 網址＋允許麥克風才能用（直接開檔 file:// 會被擋）。發音辨識還需要連網，建議用 Chrome / Edge。</div>
    </div>`;
  bindSpk();
  view.querySelectorAll("[data-spkslow]").forEach(b=>b.onclick=()=>speak(b.dataset.spkslow,0.62));
  document.getElementById("repeat").onclick=()=>{ shadowReps=Math.min(5,shadowReps+1); markStudied(); setDaily("speak"); save(); renderSpeak(); };
  const ns=document.getElementById("nextS"); if(ns) ns.onclick=()=>{ S.shadowIdx++; shadowReps=0; save(); renderSpeak(); };
  const recBtn=document.getElementById("recBtn"); if(recBtn) recBtn.onclick=()=>toggleRecord(recBtn,document.getElementById("recOut"));
  const pronBtn=document.getElementById("pronBtn"); if(pronBtn) pronBtn.onclick=()=>pronCheck(s[0], document.getElementById("pronOut"), pronBtn);
  document.getElementById("spoke").onclick=()=>{ markStudied(); setDaily("speak"); save(); alert("讚 👍 開口就是進步。回「今天」看看四件事完成幾項。"); };
}

/* ---- STATS ---- */
function renderStats(){
  const learned=learnedCount(), pct=Math.round(learned/VOCAB.length*100), byCat={};
  Object.keys(CATS).forEach(c=>byCat[c]=[0,0]);
  VOCAB.forEach((v,i)=>{byCat[v[5]][1]++; if(cardState(i).seen)byCat[v[5]][0]++;});
  view.innerHTML=`
    <div class="card">
      <h2>進度</h2>
      <div class="row">
        <div class="stat"><b>${S.streak}</b><span>連續天數</span></div>
        <div class="stat"><b>${learned}</b><span>學過單字</span></div>
        <div class="stat"><b>${S.reviews}</b><span>累計複習</span></div>
      </div>
      <p class="muted" style="margin:14px 0 4px">整體 ${learned}/${VOCAB.length}（${pct}%）</p>
      <div class="progbar"><i style="width:${pct}%"></i></div>
    </div>
    <div class="card">
      <h2>各分類</h2>
      ${Object.keys(CATS).map(c=>{const[a,b]=byCat[c],p=Math.round(a/b*100);
        return `<p class="muted" style="margin:8px 0 2px">${CATS[c]} · ${a}/${b}</p><div class="progbar"><i style="width:${p}%"></i></div>`;}).join("")}
    </div>
    <div class="card center">
      <p class="muted" style="margin:0 0 8px">所有進度都存在這台裝置的瀏覽器裡。</p>
      <a class="reset" id="wipe">清除全部進度</a>
    </div>`;
  document.getElementById("wipe").onclick=()=>{ if(confirm("確定清除全部學習進度？無法復原。")){localStorage.removeItem(KEY);S=load();render();} };
}

/* ---------------- helpers ---------------- */
function bindSpk(){ view.querySelectorAll("[data-spk]").forEach(b=>b.onclick=()=>speak(b.dataset.spk)); }
function setNav(){ document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab)); }
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; if(tab!=="cards")review=null; if(tab!=="speak")shadowReps=0; setNav(); render(); });
render();

/* PWA: register service worker (offline + installable). Only works over HTTPS; silently no-ops on file://. */
if("serviceWorker" in navigator){ window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }
</script>
</body>
