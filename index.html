<style>
  :root{
    --bg:#f6f1e7; --card:#fffaf0; --ink:#2e2517; --muted:#8a7d63;
    --line:#e3d8c2; --sage:#6b8064; --sage-d:#56684f; --plum:#9b8fb5;

  header{display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:6px 2px 14px}

  header .streak{font-family:var(--mono); font-size:13px; color:var(--sage-d); background:#eef1e9; border:1px solid #d9e0cf; padding:5px 10px; border-radius:999px; white-space:nowrap}

  h2{font-family:"Noto Serif TC",serif; font-size:16px; margin:0 0 10px}
  .muted{color:var(--muted); font-size:13px}
  .row{display:flex; gap:10px; flex-wrap:wrap}
  .stat{flex:1; min-width:80px; text-align:center; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 6px}
  .stat b{display:block; font-family:var(--mono); font-size:22px; color:var(--sage-d)}
  .stat span{font-size:11px; color:var(--muted)}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:12px; font-size:15px; padding:12px 16px; transition:transform .05s, filter .15s}
  button:active{transform:translateY(1px)}
  .btn-primary{background:var(--sage); color:#fff; width:100%; font-weight:600; letter-spacing:.5px}
  .btn-primary:hover{filter:brightness(1.05)}
  .btn-primary:disabled{background:#c8cdbf; cursor:default}
  .btn-ghost{background:#f0ead9; color:var(--ink); border:1px solid var(--line)}

  nav button.on{color:var(--sage-d); font-weight:700}
  .spk{display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:50%; background:#eef1e9; border:1px solid #d9e0cf; color:var(--sage-d); font-size:15px; padding:0}

  .fc .pos{font-family:var(--mono); font-size:12px; color:var(--plum); margin-bottom:12px}

  .reading p{font-size:16px; line-height:1.85}
  .gw{border-bottom:1.5px dotted var(--amber); cursor:pointer; color:var(--sage-d); font-weight:600}
  .glossbox{margin-top:14px; border-top:1px dashed var(--line); padding-top:12px}

  .ck.on{background:var(--sage); border-color:var(--sage)}
  .checklist li .go{margin-left:auto; font-size:12px; color:var(--sage-d); background:#eef1e9; border:1px solid #d9e0cf; padding:5px 10px; border-radius:999px}
  .deck-item{display:flex; justify-content:space-between; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line); font-size:14px; align-items:center}
  .deck-item:last-child{border-bottom:none}
  .deck-item .t{font-weight:600}
  .deck-item .z{color:var(--muted); font-size:12.5px}
  .deck-item .b{font-family:var(--mono); font-size:10px; color:var(--plum); white-space:nowrap}
  .filterbar{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px}
  .filterbar button{font-size:11px; padding:6px 10px; background:#f0ead9; color:var(--muted)}
  .filterbar button.on{background:var(--sage); color:#fff}
  .progbar{height:8px; background:#eadfca; border-radius:99px; overflow:hidden; margin:8px 0}
  .progbar i{display:block; height:100%; background:var(--sage)}

  .hint{font-size:12.5px; color:var(--muted); background:#f4eedd; border-radius:10px; padding:10px 12px; margin-top:6px}
  .center{text-align:center}

/* ---------------- STATE / STORAGE ---------------- */
const KEY="founder_english_v2", DAY=86400000, NEW_PER_DAY=8;
let S = load();
function load(){
  let d; try{ d=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  if(!d) d={};
  d.cards=d.cards||{}; d.streak=d.streak||0; d.lastStudy=d.lastStudy||null;
  d.newToday=d.newToday||{date:null,count:0}; d.reviews=d.reviews||0;
  d.readIdx=d.readIdx||0; d.shadowIdx=d.shadowIdx||0;
  d.writeLog=d.writeLog||{}; d.daily=d.daily||{date:null,review:false,read:false,speak:false,write:false};
  return d;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function todayStr(){const t=new Date();return t.getFullYear()+"-"+(t.getMonth()+1)+"-"+t.getDate();}
function cardState(id){ if(!S.cards[id]) S.cards[id]={due:0,interval:0,ease:2.5,reps:0,seen:false}; return S.cards[id]; }
function resetNewCounter(){const t=todayStr(); if(S.newToday.date!==t) S.newToday={date:t,count:0};}
function resetDaily(){const t=todayStr(); if(S.daily.date!==t) S.daily={date:t,review:false,read:false,speak:false,write:false};}
function setDaily(f){ resetDaily(); S.daily[f]=true; save(); }

function buildQueue(){
  resetNewCounter();
  const now=Date.now(), due=[], fresh=[];
  VOCAB.forEach((v,i)=>{const c=cardState(i); if(c.seen){if(c.due<=now)due.push(i);} else fresh.push(i);});
  const room=Math.max(0,NEW_PER_DAY-S.newToday.count);
  return due.concat(fresh.slice(0,room));
}
function grade(id,g){
  const c=cardState(id), wasNew=!c.seen;
  if(g==="again"){c.reps=0;c.interval=0;c.ease=Math.max(1.3,c.ease-0.2);c.due=Date.now()+5*60000;}
  else{
    if(g==="hard"){c.interval=Math.max(1,Math.round((c.interval||1)*1.2));c.ease=Math.max(1.3,c.ease-0.15);}
    else if(g==="good"){c.interval=c.reps===0?1:c.reps===1?3:Math.round((c.interval||1)*c.ease);}
    else{c.interval=c.reps===0?2:c.reps===1?5:Math.round((c.interval||1)*c.ease*1.3);c.ease=c.ease+0.15;}
    c.reps++; c.due=Date.now()+c.interval*DAY;
  }
  if(wasNew){c.seen=true;resetNewCounter();S.newToday.count++;}
  S.reviews++; markStudied(); setDaily("review"); save();
}
function markStudied(){
  const t=todayStr(); if(S.lastStudy===t) return;
  const y=new Date(Date.now()-DAY), ys=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  S.streak=(S.lastStudy===ys)?S.streak+1:1; S.lastStudy=t;
}
function dueCount(){resetNewCounter();const now=Date.now();let n=0;VOCAB.forEach((v,i)=>{const c=cardState(i);if(c.seen&&c.due<=now)n++;});return n;}
function learnedCount(){let n=0;for(const k in S.cards)if(S.cards[k].seen)n++;return n;}
function newLeftToday(){resetNewCounter();const u=VOCAB.filter((v,i)=>!cardState(i).seen).length;return Math.min(u,Math.max(0,NEW_PER_DAY-S.newToday.count));}

/* ---------------- TTS (offline speech) ---------------- */
let _voice=null;
function pickVoice(){
  const vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];
  _voice = vs.find(v=>/en[-_]US/i.test(v.lang)&&/natural|google|samantha|aaron/i.test(v.name))
        || vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if(window.speechSynthesis){ pickVoice(); window.speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text,rate){
  if(!window.speechSynthesis){ alert("此瀏覽器不支援語音，建議用 Chrome / Edge。"); return; }
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=rate||0.9; if(_voice)u.voice=_voice;
  window.speechSynthesis.speak(u);
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function q(s){return s.replace(/"/g,"&quot;");}

/* ---------------- 錄音對比（需 HTTPS，如 GitHub Pages） ---------------- */
let _rec=null,_chunks=[],_stream=null;
async function toggleRecord(btn,out){
  if(_rec && _rec.state==="recording"){ _rec.stop(); return; }
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||typeof MediaRecorder==="undefined"){
    out.innerHTML='<div class="hint">這個環境不支援錄音（多半是直接開檔 file://）。部署到 GitHub Pages（HTTPS）後就能錄。</div>'; return;
  }
  try{ _stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ out.innerHTML='<div class="hint">沒拿到麥克風權限。請在瀏覽器允許麥克風，或先部署到 HTTPS 再試。</div>'; return; }
  _chunks=[]; _rec=new MediaRecorder(_stream);
  _rec.ondataavailable=e=>{ if(e.data.size>0)_chunks.push(e.data); };
  _rec.onstop=()=>{
    const blob=new Blob(_chunks,{type:_rec.mimeType||"audio/webm"}), url=URL.createObjectURL(blob);
    out.innerHTML='<div class="muted" style="font-size:12px;margin-bottom:6px">你的錄音（跟上面 🔊 範例比對語調）：</div><audio controls src="'+url+'" style="width:100%"></audio>';
    if(_stream){_stream.getTracks().forEach(t=>t.stop());_stream=null;}
    btn.textContent="● 重新錄音"; markStudied(); setDaily("speak"); save();
  };
  _rec.start(); btn.textContent="⏹ 停止錄音（說完按這）";
}

  bindSpk();
  view.querySelectorAll("[data-spkslow]").forEach(b=>b.onclick=()=>speak(b.dataset.spkslow,0.62));
  document.getElementById("repeat").onclick=()=>{ shadowReps=Math.min(5,shadowReps+1); markStudied(); setDaily("speak"); save(); renderSpeak(); };
  const ns=document.getElementById("nextS"); if(ns) ns.onclick=()=>{ S.shadowIdx++; shadowReps=0; save(); renderSpeak(); };
  const recBtn=document.getElementById("recBtn"); if(recBtn) recBtn.onclick=()=>toggleRecord(recBtn,document.getElementById("recOut"));
  document.getElementById("spoke").onclick=()=>{ markStudied(); setDaily("speak"); save(); alert("讚 👍 開口就是進步。回「今天」看看四件事完成幾項。"); };
}

/* ---- STATS ---- */
function renderStats(){
  const learned=learnedCount(), pct=Math.round(learned/VOCAB.length*100), byCat={};
  Object.keys(CATS).forEach(c=>byCat[c]=[0,0]);
  VOCAB.forEach((v,i)=>{byCat[v[5]][1]++; if(cardState(i).seen)byCat[v[5]][0]++;});
  view.innerHTML=`
    <div class="card">
      <h2>進度</h2>
      <div class="row">
        <div class="stat"><b>${S.streak}</b><span>連續天數</span></div>
        <div class="stat"><b>${learned}</b><span>學過單字</span></div>
        <div class="stat"><b>${S.reviews}</b><span>累計複習</span></div>
      </div>
      <p class="muted" style="margin:14px 0 4px">整體 ${learned}/${VOCAB.length}（${pct}%）</p>
      <div class="progbar"><i style="width:${pct}%"></i></div>
    </div>
    <div class="card">
      <h2>各分類</h2>
      ${Object.keys(CATS).map(c=>{const[a,b]=byCat[c],p=Math.round(a/b*100);
        return `<p class="muted" style="margin:8px 0 2px">${CATS[c]} · ${a}/${b}</p><div class="progbar"><i style="width:${p}%"></i></div>`;}).join("")}
    </div>
    <div class="card center">
      <p class="muted" style="margin:0 0 8px">所有進度都存在這台裝置的瀏覽器裡。</p>
      <a class="reset" id="wipe">清除全部進度</a>
    </div>`;
  document.getElementById("wipe").onclick=()=>{ if(confirm("確定清除全部學習進度？無法復原。")){localStorage.removeItem(KEY);S=load();render();} };
}

/* ---------------- helpers ---------------- */
function bindSpk(){ view.querySelectorAll("[data-spk]").forEach(b=>b.onclick=()=>speak(b.dataset.spk)); }
function setNav(){ document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab)); }
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; if(tab!=="cards")review=null; if(tab!=="speak")shadowReps=0; setNav(); render(); });
render();
</script>
</body>
</html>
