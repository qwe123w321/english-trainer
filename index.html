<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">

<title>Founder English｜創業者英語訓練</title>
<style>
  :root{
    --bg:#f6f1e7; --card:#fffaf0; --ink:#2e2517; --muted:#8a7d63;
    --line:#e3d8c2; --sage:#6b8064; --sage-d:#56684f; --plum:#9b8fb5;
    --amber:#c9a24a; --red:#b8503e; --shadow:0 1px 0 #efe6d2,0 8px 24px rgba(60,47,31,.07);
    --r:16px; --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Noto Sans TC",-apple-system,"Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.6; padding-bottom:92px}
  .wrap{max-width:680px; margin:0 auto; padding:18px 16px}
  header{display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:6px 2px 14px}
  header h1{font-family:"Noto Serif TC",serif; font-size:20px; margin:0; letter-spacing:.5px}
  header .streak{font-family:var(--mono); font-size:13px; color:var(--sage-d); background:#eef1e9; border:1px solid #d9e0cf; padding:5px 10px; border-radius:999px; white-space:nowrap}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:18px; margin-bottom:14px}
  h2{font-family:"Noto Serif TC",serif; font-size:16px; margin:0 0 10px}
  .muted{color:var(--muted); font-size:13px}
  .row{display:flex; gap:10px; flex-wrap:wrap}
  .stat{flex:1; min-width:80px; text-align:center; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 6px}
  .stat b{display:block; font-family:var(--mono); font-size:22px; color:var(--sage-d)}
  .stat span{font-size:11px; color:var(--muted)}
  button{font-family:inherit; cursor:pointer; border:none; border-radius:12px; font-size:15px; padding:12px 16px; transition:transform .05s, filter .15s}
  button:active{transform:translateY(1px)}
  .btn-primary{background:var(--sage); color:#fff; width:100%; font-weight:600; letter-spacing:.5px}
  .btn-primary:hover{filter:brightness(1.05)}
  .btn-primary:disabled{background:#c8cdbf; cursor:default}
  .btn-ghost{background:#f0ead9; color:var(--ink); border:1px solid var(--line)}
  nav{position:fixed; bottom:0; left:0; right:0; background:rgba(255,250,240,.94); backdrop-filter:blur(8px); border-top:1px solid var(--line); display:flex; z-index:20}
  nav button{flex:1; background:none; border-radius:0; padding:9px 2px 11px; color:var(--muted); font-size:10.5px; display:flex; flex-direction:column; align-items:center; gap:3px}
  nav button .ic{font-family:var(--mono); font-size:16px; line-height:1}
  nav button.on{color:var(--sage-d); font-weight:700}
  .spk{display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:50%; background:#eef1e9; border:1px solid #d9e0cf; color:var(--sage-d); font-size:15px; padding:0}
  .spk:hover{background:#e3ead9}
  .fc{min-height:210px; display:flex; flex-direction:column; justify-content:center; text-align:center; padding:22px 16px}
  .fc .term{font-family:"Noto Serif TC",serif; font-size:29px; font-weight:700; margin-bottom:4px}
  .fc .pos{font-family:var(--mono); font-size:12px; color:var(--plum); margin-bottom:12px}
  .fc .zh{font-size:21px; margin:4px 0 8px}
  .fc .def{font-size:14px; color:var(--muted); margin-bottom:12px}
  .fc .ex{font-size:15px; font-style:italic; background:#f4eedd; border-left:3px solid var(--amber); padding:10px 12px; border-radius:8px; text-align:left; display:flex; gap:8px; align-items:flex-start}
  .ex .spk{flex:0 0 auto; width:30px; height:30px; font-size:13px}
  .grades{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:14px}
  .grades button{font-size:13px; padding:12px 4px; color:#fff; font-weight:600}
  .g-again{background:#b8503e} .g-hard{background:#c9952f} .g-good{background:#6b8064} .g-easy{background:#7d93b0}
  .grades small{display:block; font-family:var(--mono); font-size:9px; opacity:.85; font-weight:400; margin-top:2px}
  .done{text-align:center; padding:30px 10px}
  .done .big{font-size:40px}
  .reading p{font-size:16px; line-height:1.85}
  .gw{border-bottom:1.5px dotted var(--amber); cursor:pointer; color:var(--sage-d); font-weight:600}
  .glossbox{margin-top:14px; border-top:1px dashed var(--line); padding-top:12px}
  .glossbox div{font-size:13.5px; margin-bottom:7px}
  .glossbox b{color:var(--sage-d)}
  .pill{font-family:var(--mono); font-size:11px; color:var(--muted); background:#f0ead9; padding:3px 8px; border-radius:999px}
  textarea{width:100%; min-height:88px; font-family:inherit; font-size:15px; border:1px solid var(--line); border-radius:12px; padding:12px; background:#fffdf8; resize:vertical; color:var(--ink)}
  .checklist{list-style:none; padding:0; margin:0}
  .checklist li{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:15px}
  .checklist li:last-child{border-bottom:none}
  .ck{width:22px; height:22px; border-radius:6px; border:2px solid var(--line); display:inline-flex; align-items:center; justify-content:center; font-size:13px; color:#fff; flex:0 0 auto}
  .ck.on{background:var(--sage); border-color:var(--sage)}
  .checklist li .go{margin-left:auto; font-size:12px; color:var(--sage-d); background:#eef1e9; border:1px solid #d9e0cf; padding:5px 10px; border-radius:999px}
  .deck-item{display:flex; justify-content:space-between; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line); font-size:14px; align-items:center}
  .deck-item:last-child{border-bottom:none}
  .deck-item .t{font-weight:600}
  .deck-item .z{color:var(--muted); font-size:12.5px}
  .deck-item .b{font-family:var(--mono); font-size:10px; color:var(--plum); white-space:nowrap}
  .filterbar{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px}
  .filterbar button{font-size:11px; padding:6px 10px; background:#f0ead9; color:var(--muted)}
  .filterbar button.on{background:var(--sage); color:#fff}
  .progbar{height:8px; background:#eadfca; border-radius:99px; overflow:hidden; margin:8px 0}
  .progbar i{display:block; height:100%; background:var(--sage)}
  a.reset{color:var(--muted); font-size:12px; text-decoration:underline; cursor:pointer}
  .kterm{display:inline-block; font-family:var(--mono); font-size:11px; color:var(--sage-d); background:#eef1e9; border:1px solid #d9e0cf; padding:3px 8px; border-radius:999px; margin:0 5px 5px 0; cursor:pointer}
  .kbody{font-size:14.5px; line-height:1.85}
  .kbody p{margin:0 0 8px}
  .vidcard{display:block; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; text-decoration:none; color:var(--ink)}
  .vidcard:hover{background:#faf3e3}
  .vidcard .vt{font-weight:600; margin-bottom:2px}
  .vidcard .vm{font-size:12px; color:var(--muted)}
  .lvl{font-family:var(--mono); font-size:10px; color:var(--plum); border:1px solid #ddd3e0; border-radius:999px; padding:1px 6px}
  .shadow-sent{font-family:"Noto Serif TC",serif; font-size:21px; line-height:1.5; margin:6px 0 4px}
  .shadow-zh{color:var(--muted); font-size:15px; margin-bottom:14px}
  .repdots{display:flex; gap:8px; justify-content:center; margin:12px 0}
  .repdots span{width:14px; height:14px; border-radius:50%; border:2px solid var(--line)}
  .repdots span.on{background:var(--amber); border-color:var(--amber)}
  .hint{font-size:12.5px; color:var(--muted); background:#f4eedd; border-radius:10px; padding:10px 12px; margin-top:6px}
  .lline{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:3px}
  .lline:hover{background:#f4eedd}
  .lline.on{background:#eef1e9;border-left:3px solid var(--sage)}
  .lline .len{font-size:15.5px;line-height:1.55}
  .lline .lzh{font-size:13px;color:var(--muted);margin-top:2px}
  .nozh .lline .lzh{display:none}
  .center{text-align:center}
</style>
</head>

<div class="wrap">
  <header><h1>Founder English</h1><span class="streak" id="streakBadge">🔥 0 天</span></header>

  <button data-tab="today" class="on"><span class="ic">◎</span>今天</button>

</nav>

<script>
/* ============================================================
   Founder English — personal, offline, single file.
   Research-backed design:
   - SRS + retrieval practice (testing effect)  -> 單字
   - Comprehensible input (i+1, ~85% understood)-> 閱讀
   - Pushed output + Shadowing (Swain / 2025 review) -> 口說 + 每日一寫
   - TTS audio everywhere (offline), context-rich cards (Hulstijn)
   ============================================================ */

w if you have any questions.","everyday"],["first and last month's rent","phr.","頭尾兩個月的房租","美國租房簽約時，常要先付第一個月加最後一個月的租金。","Move-in is first and last month's rent plus deposit.","everyday"],["security deposit","n.","押金","租房時付給房東、退租檢查無損壞才退還的保證金。","The security deposit is one month's rent.","everyday"],["utilities","n.","水電瓦斯網路等費用","租房時水、電、瓦斯、網路等月費，要確認有沒有包含在房租裡。","Are utilities included in the rent?","everyday"],["sign a lease","phr.","簽租約","和房東簽訂正式的租賃合約，通常一簽就是一年。","We're ready to sign a lease this week.","everyday"],["open a checking account","phr.","開一個支票帳戶","在美國銀行開立日常收支用的帳戶，類似台灣的活存帳戶。","I'd like to open a checking account, please.","everyday"],["Social Security number","n.","社會安全號碼","美國的個人識別號碼，開戶、辦信用卡、報稅都會用到。","Do I need a Social Security number to open this?","everyday"],["swipe your card","phr.","刷卡","結帳時刷信用卡或金融卡，店員常這樣請你付款。","You can swipe your card right here.","everyday"],["What do you recommend?","phr.","你推薦什麼？","餐廳點餐時不知道點什麼，請服務生給建議。","It's my first time here. What do you recommend?","everyday"],["I'll have the","phr.","我要點……","餐廳點餐時告訴服務生你選的餐點，後面接菜名。","I'll have the grilled salmon, please.","everyday"],["Can we get the check?","phr.","可以結帳嗎？","在美國餐廳用餐結束後，請服務生把帳單拿來。","That was great. Can we get the check, please?","everyday"],["to go","phr.","外帶","點餐或打包時表示要帶走、不在店內吃。","Can I get that to go?","everyday"],["Keep the change.","phr.","不用找了。","付現金時告訴對方零錢當小費、不用找回。","Here's twenty. Keep the change.","everyday"],["I see where you're coming from, but","phrase","我懂你的意思，不過","禮貌地表達不同意的開場句。先承認對方觀點站得住腳，再提出自己的看法，能讓反對顯得尊重而非衝突，是美國職場很常見的緩衝句。","I see where you're coming from, but I'd hold off on that.","everyday"],["I'm not totally sold on that","phrase","我還沒被說服","委婉表示自己對某提議還有疑慮，尚未認同。語氣輕鬆但立場明確，比直接說「我反對」溫和許多，適合會議中表達保留。","I'm not totally sold on that. Can you walk me through the numbers?","everyday"],["Just so we're on the same page","phrase","為了確認我們認知一致","在釐清或重述共識前的開場句，用來確認雙方理解相同，避免後續誤會。是會議與郵件裡很自然的確認用語。","Just so we're on the same page, we ship on Friday, right?","everyday"],["Let me make sure I've got this right","phrase","讓我確認一下我理解正確","在覆述對方說的內容前使用，用來確認自己沒聽錯。語氣謙和又專業，能避免因誤解而出錯。","Let me make sure I've got this right, you need it by noon?","everyday"],["My bad","phrase","我的錯","口語化、輕鬆地承認小失誤，常見於同事之間。比正式道歉隨意，適合無傷大雅的小錯，較嚴重的場合則不宜使用。","My bad, I sent the wrong file. Resending now.","everyday"],["Let me make it right","phrase","讓我來補救","犯錯後主動表示要彌補、把事情處理好。展現負責任的態度，常接在道歉之後，能挽回信任。","Sorry about the mix-up. Let me make it right.","everyday"],["That one's on me","phrase","這是我的責任","坦白承擔某件事的過錯或責任。語氣誠懇有擔當，在團隊出包時主動扛責能贏得尊重。","The deadline slipped, and that one's on me.","everyday"],["Where do we stand on","phrase","目前進度如何","詢問某項任務或專案目前進展到哪裡的常用句。語氣專業中性，適合主管或同事追蹤進度。","Where do we stand on the investor deck?","everyday"],["Any update on","phrase","有沒有新進展","輕鬆地追蹤某件事的最新狀況。比正式詢問柔和，常用於郵件或即時通訊催進度而不顯急躁。","Any update on the contract from legal?","everyday"],["I'll keep you posted","phrase","我會隨時讓你知道","承諾會持續更新對方相關進展。是追蹤進度時很體貼的回應，讓對方安心，不必一直追問。","Nothing yet, but I'll keep you posted.","everyday"],["How was your weekend?","phrase","週末過得如何？","週一早上最常見的閒聊開場白，用來破冰、拉近關係。回答後通常會反問對方，是維繫同事感情的小儀式。","Morning! How was your weekend?","everyday"],["What's keeping you busy these days?","phrase","最近都在忙什麼？","社交或職場閒聊時了解對方近況的句子。比生硬的「你在做什麼」自然，能順勢開啟話題。","Good to see you. What's keeping you busy these days?","everyday"],["I'll let you get back to it","phrase","不耽誤你了","禮貌地結束對話、讓對方回去忙的客套句。展現體貼又不顯突兀，是收尾閒聊的好用語。","Anyway, I'll let you get back to it. Talk soon.","everyday"],["It is what it is","phrase","事情就是這樣，只能接受","接受無法改變的現實、不再糾結的慣用語。語氣帶點無奈但務實，美國職場閒聊很常聽到。","We lost the deal, but it is what it is.","everyday"],["Let's play it by ear","phrase","到時候看情況再說","不預先把計畫定死，視當下狀況彈性決定的慣用語。常用在約時間或安排還不確定時。","I'm not sure yet, let's play it by ear.","everyday"],["I'm slammed right now","phrase","我現在忙翻了","口語表達自己手上事情多到喘不過氣。常用來婉拒臨時的請求或解釋回覆慢，語氣自然不失禮。","I'm slammed right now, can it wait till tomorrow?","everyday"],["Let's table this for now","phrase","這件事先擱著","提議暫時把某話題或決定放一邊、之後再處理的會議用語。注意美式英文裡 table 是「擱置」，與英式相反。","Good point, but let's table this for now and move on.","everyday"],["One thing I'd push back on","phrase","有一點我想提出不同看法","禮貌地表達反對意見的開場句。push back 是職場常用的「提出異議」，先點明只有一點，能讓反對顯得克制。","One thing I'd push back on is the timeline.","everyday"],["Can I pick your brain?","phrase","可以請教你一下嗎？","想向某人請教意見或經驗時的友善請求。把對方當成知識來源，語氣輕鬆又帶尊重，常用於約人聊聊。","Can I pick your brain about hiring sometime?","everyday"],["Do you have the bandwidth for","phrase","你有餘力處理…嗎","請人幫忙前先確認對方時間與精力是否足夠。bandwidth 借自頻寬，指「可用的時間心力」，是科技圈職場常見說法。","Do you have the bandwidth for one more review?","everyday"],["Could you point me in the right direction?","phrase","可以幫我指個方向嗎？","不確定該找誰或從何下手時的求助句。不強求對方親自解決，只請對方指引，禮貌又得體。","I'm new here, could you point me in the right direction?","everyday"],["If it's not too much trouble","phrase","如果不會太麻煩的話","請求協助時的客氣緩衝語，讓要求顯得體貼、不強人所難。放在請求前後都自然。","If it's not too much trouble, could you forward that email?","everyday"],["I'll let you go","phrase","我就不多打擾了","電話或對話收尾時主動釋出善意、結束談話的句子。暗示尊重對方時間，是自然的告別過渡語。","Well, I'll let you go. Thanks for the chat!","everyday"],["Let's pick this up later","phrase","這個我們之後再繼續","話題沒談完但需先暫停時，約定稍後再接著討論。比直接打斷柔和，保留繼續對話的餘地。","Running to a meeting, let's pick this up later.","everyday"],["Mind if I","phrase","我可以…嗎","禮貌徵求同意或插話的開場句，後面接動詞原形。語氣輕鬆隨意，職場社交場合都很自然。","Mind if I jump in here for a second?","everyday"],["Thanks for flagging that","phrase","謝謝你提醒這件事","感謝對方指出問題或提醒注意的回應。flag 指「標示出來引起注意」，給回饋者正面回應，能鼓勵團隊坦誠溝通。","Thanks for flagging that, I'll fix it before we send.","everyday"],["409A valuation","n.","409A 估值","由第三方做的公司普通股公允價值評估，用來訂員工選擇權的行使價，以符合稅務規定。","We need a fresh 409A before issuing new options.","legal"],["tranche","n.","分批投資","一筆投資分成好幾期撥款，通常要達到約定的里程碑才釋出下一批。","The second tranche unlocks once we hit those milestones.","fund"],["MFN clause","n.","最惠國條款","保證這位投資人能自動享有後續其他投資人拿到的更好條件。","Her SAFE has an MFN clause, so she gets the best terms.","fund"],["side letter","n.","補充協議信","在主合約之外，單獨給某位投資人額外權利的協議。","That fund asked for a side letter with extra reporting rights.","legal"],["secondary","n.","老股轉售","既有股東把自己手上的股份賣給別人，錢進股東口袋而不是進公司。","Two founders sold some shares in a secondary last round.","fund"],["recapitalization","n.","資本重組","重新調整公司的股權結構，常見於拯救陷入困境的公司，往往會稀釋原股東。","The down round forced a painful recapitalization.","legal"],["fully diluted","adj.","完全稀釋後","把所有選擇權、認股權證、可轉換證券都算進去之後的總股數。","On a fully diluted basis, you own about eight percent.","legal"],["common stock","n.","普通股","創辦人和員工持有的基本股份，清算時順位排在優先股後面。","Founders and employees hold common stock.","legal"],["preferred stock","n.","優先股","投資人拿到的股份，附帶清算優先權等特殊保護，順位優於普通股。","VCs almost always buy preferred stock, not common.","legal"],["single-trigger acceleration","n.","單一觸發加速","公司一被收購，你還沒歸屬的股權就立刻歸屬，只需要這一件事發生。","His offer included single-trigger acceleration on a sale.","legal"],["double-trigger acceleration","n.","雙重觸發加速","要被收購加上你被資遣，兩件事都發生股權才加速歸屬，是目前的主流做法。","Most plans use double-trigger acceleration these days.","legal"],["drag-along","n.","強制隨售權","多數股東決定賣公司時，可以強迫少數股東按相同條件一起賣。","The drag-along lets the majority force a clean sale.","legal"],["tag-along","n.","跟售權","大股東賣股時，小股東有權按相同條件一起搭著賣出去。","Tag-along rights protect us if the founder exits.","legal"],["ROFR","n.","優先承購權","股東要賣股之前，公司或其他股東有權用同樣價格先買下來。","The ROFR means the company can buy those shares first.","legal"],["information rights","n.","資訊取得權","投資人有權定期拿到公司的財報和營運數據。","Major investors get information rights and quarterly numbers.","legal"],["83(b) election","n.","83(b) 稅務選擇","在股份還沒歸屬時就先報稅，鎖住低稅基，必須在取得後三十天內提交。","File your 83(b) within thirty days of the grant.","legal"],["QSBS","n.","合格小型企業股票","符合條件的新創股票，持有夠久後賣出，部分或全部資本利得可免聯邦稅。","If it qualifies as QSBS, your gains could be tax-free.","legal"],["Delaware C-corp","n.","德拉瓦州 C 型公司","美國新創最常採用的公司型態，創投幾乎都偏好這種架構。","Investors will expect you to be a Delaware C-corp.","legal"],["SPV","n.","特殊目的載體","專為一筆投資成立的單一用途公司，常把一群小額投資人匯整成股權表上的一行。","We pooled the angels into an SPV for one cap table line.","fund"],["syndicate","n.","投資聯盟","由一位領投帶頭，一群投資人跟著一起投同一筆交易。","She runs a syndicate that backs early-stage SaaS.","fund"],["rolling fund","n.","滾動式基金","按季持續募資的創投基金，投資人可以隨時用訂閱方式加入。","He raises through a rolling fund every quarter.","fund"],["advisor shares","n.","顧問股","發給顧問以換取建議和人脈的小額股權，通常會分期歸屬。","We gave her half a percent in advisor shares.","legal"],["post-money SAFE","n.","投後 SAFE","以投資後估值計算的 SAFE，投資人占比一開始就鎖定，是現在的主流版本。","Most US founders now use a post-money SAFE.","fund"],["pre-money SAFE","n.","投前 SAFE","以投資前估值計算的舊版 SAFE，稀釋算法對創辦人比較不確定。","The old pre-money SAFE made dilution harder to track.","fund"],["warrant","n.","認股權證","一種權利，讓持有人未來可以用約定價格買進公司股份。","The lender also took a warrant for one percent.","legal"],["escrow","n.","履約保證款","交易時先把一部分款項交給第三方保管，等條件達成或保證期滿才放款。","Part of the purchase price sits in escrow for a year.","legal"],["vesting acceleration","n.","歸屬加速","在特定事件下，把原本要慢慢歸屬的股權提早歸屬給你。","The deal triggered vesting acceleration for the team.","legal"],["par value","n.","票面價值","股份在公司章程上登記的名目最低面額，通常極小，例如每股零點零零零一美元。","Each share has a par value of one hundredth of a cent.","legal"],["authorized shares","n.","法定股本","公司章程允許發行的股份總上限，已發行的只是其中一部分。","We raised our authorized shares to grow the option pool.","legal"],["strike price","n.","行使價","員工日後實際買進選擇權股份所要付的固定價格。","Your strike price is locked at the grant date.","legal"],["information memorandum","n.","投資說明書","募資時整理給投資人看的詳細公司與交易資料文件。","Send the information memorandum to interested LPs.","fund"],["capital call","n.","資金催繳","基金通知出資人按承諾把錢實際匯進來，用於某筆投資。","The fund issued a capital call to close the deal.","fund"],["ARPU","n.","每用戶平均營收","Average Revenue Per User，總營收除以總用戶數，衡量每位用戶平均貢獻多少收入，包含付費與免費用戶。","Our ARPU is twelve dollars a month.","metric"],["ARPA","n.","每帳戶平均營收","Average Revenue Per Account，總營收除以付費帳戶數，常用於 B2B SaaS，看一個客戶帳戶平均帶來多少收入。","We grew ARPA by upselling bigger teams.","metric"],["expansion revenue","n.","擴張營收","現有客戶因升級方案、加購座位或加購功能而帶來的額外營收，是淨營收留存的關鍵推力。","Most of our growth now comes from expansion revenue.","metric"],["gross churn","n.","總流失率","在一段期間內流失的營收占期初營收的比例，不計入擴張營收，純看流掉多少。","Gross churn sits around three percent a month.","metric"],["net churn","n.","淨流失率","流失營收減去擴張營收後占期初的比例，若擴張大於流失會出現負淨流失，是好現象。","We actually hit negative net churn last quarter.","metric"],["logo churn","n.","客戶數流失率","以客戶（公司、帳戶）數量計算的流失率，不看金額，一個客戶離開就算一個流失。","Logo churn is low, but the lost accounts were big.","metric"],["magic number","n.","魔術數字","SaaS 銷售效率指標，新增年化營收除以前期銷售與行銷支出，大於一表示投錢獲客划算。","A magic number above one means we can spend more.","metric"],["quick ratio","n.","成長快速比","新增加上擴張營收，除以流失加上萎縮營收，衡量成長相對流失的健康度，越高越好。","A quick ratio of four shows healthy growth.","metric"],["viral coefficient","n.","病毒係數","平均每位用戶帶來幾位新用戶，大於一代表能自我擴散，不靠付費也會成長。","Our viral coefficient is still below one.","metric"],["k-factor","n.","K 因子","病毒成長的量化指標，等於每位用戶發出的邀請數乘以轉換率，是病毒係數的常見叫法。","We tweaked the invite flow to lift our k-factor.","metric"],["DAU/MAU","n.","日活月活比","日活躍用戶除以月活躍用戶，衡量黏著度，比值越高代表用戶越常回來。","A DAU/MAU of fifty percent is really sticky.","metric"],["burn multiple","n.","燒錢倍數","淨燒錢金額除以新增年化營收，衡量每換來一塊新營收要燒掉幾塊錢，越低越有效率。","Investors love a burn multiple under one.","metric"],["cohort retention","n.","同期群留存","把同一時間進來的用戶分成一組，追蹤他們隨時間還留下多少，看產品是否真的留得住人。","Show me the cohort retention by signup month.","metric"],["hockey stick","n.","曲棍球桿成長","成長曲線先平緩後突然陡升，形狀像曲棍球桿，投資人最想看到的爆發性成長軌跡。","The chart finally shows a real hockey stick.","metric"],["time to value","n.","產生價值的時間","用戶從開始使用到第一次真正感受到產品好處所花的時間，越短越容易留住新用戶。","We cut time to value from a week to a day.","product"],["aha moment","n.","頓悟時刻","用戶第一次真正體會到產品價值、決定留下來的關鍵瞬間，是啟動與留存設計的核心。","For us, the aha moment is the first shared note.","product"],["ICP","n.","理想客戶輪廓","Ideal Customer Profile，最適合你產品、最容易成交又最有價值的目標客戶樣貌描述。","This lead doesn't fit our ICP at all.","product"],["beachhead","n.","灘頭堡市場","進入市場時鎖定的第一個小而集中的切入族群，先在這裡贏，再往外擴張。","Romance readers are our beachhead market.","product"],["wedge","n.","切入點","用一個小而尖銳的功能或痛點切進市場，先站穩腳步，之後再延伸成更大的產品。","Our wedge is one feature nobody else nails.","product"],["PLG","n.","產品驅動成長","Product-Led Growth，靠產品本身吸引、轉換、留住用戶來成長，而非主要靠業務團隊推銷。","We're a PLG company, so the product sells itself.","product"],["land and expand","phr.","先落地再擴張","先用小合約打進一個客戶或團隊，證明價值後再往整個組織擴大使用與營收。","Our sales motion is classic land and expand.","product"],["design partner","n.","設計夥伴客戶","早期願意深度參與、一起共創產品的客戶，用真實回饋換取優先功能與優惠。","We onboarded three design partners this month.","product"],["lighthouse customer","n.","標竿客戶","知名度高、能當作公開招牌的代表性客戶，拿下後對其他潛在客戶有強烈說服力。","Landing that lighthouse customer opened doors.","product"],["waitlist","n.","候補名單","產品還沒全面開放前，先讓有興趣的人登記排隊，用來蓄積需求、製造稀缺感與篩選早期用戶。","We have ten thousand people on the waitlist.","product"],["unfair advantage","n.","不公平優勢","競爭對手短期內買不到也抄不走的獨特優勢，例如獨家數據、人脈或專屬技術。","What's your unfair advantage here?","pitch"],["warm intro","n.","熟人引薦","透過雙方都認識的人牽線介紹，比陌生開發更容易得到回應與信任，募資時尤其重要。","Can you get me a warm intro to that partner?","pitch"],["cold outreach","n.","陌生開發","在沒有任何引薦的情況下主動聯繫陌生對象，例如冷郵件或冷訊息，轉換率低但可規模化。","We booked two meetings from cold outreach.","pitch"],["data room","n.","資料室","募資或併購盡職調查時，集中存放財務、合約、指標等機密文件的線上資料夾，供投資人查閱。","I'll send the data room link after the call.","pitch"],["investor update","n.","投資人更新信","定期寄給現有與潛在投資人的進度報告，講指標、里程碑與需要的幫忙，維繫關係也預熱下一輪。","Our monthly investor update goes out on Fridays.","pitch"],["problem slide","n.","問題頁","募資簡報裡專門講清楚你要解決什麼痛點的那一頁，必須讓投資人立刻感受到問題夠真夠大。","Your problem slide needs to hit harder.","pitch"],["traction slide","n.","成長實績頁","募資簡報裡用數字證明產品有人要、正在成長的那一頁，通常放成長曲線與關鍵指標。","The traction slide is what they screenshot.","pitch"]]);
READINGS.push(...[{"title":"How a SAFE Actually Works","body":"A **SAFE** is a simple way to raise early money. The investor gives you cash now, but does not get **equity** yet. Instead, the SAFE turns into shares later, usually at your next **priced round**. Most SAFEs today set a **valuation cap**, which limits the valuation used to convert the investor's money into shares. Some also add a **discount**, so they pay a bit less than new investors. A SAFE is not a loan. There is no interest and no due date. **Y Combinator** created it to make early deals fast and cheap. Founders like it because you can close in days, not months.","gloss":[["SAFE","簡單未來股權協議，早期常用的募資工具"],["equity","股權，公司的所有權份額"],["priced round","定價輪，有正式估值的募資"],["valuation cap","估值上限"],["discount","折扣，投資人轉股時的優惠價"],["Y Combinator","矽谷知名新創加速器"]]},{"title":"What Investors Are Looking For","body":"When you pitch, investors care most about a few things. First, the **team**: can these people really build and sell this? Second, the **market**: is it big enough to grow fast? A small market makes a big return hard. Third, **traction**: do you have early signs that people want this, like users or revenue? Many ask about your **TAM**, the total size of your market. Early investors take big risks, so they look for huge **upside**. They know most startups fail, but a few must return the whole fund. So they want companies that could become very large, not just safe small ones.","gloss":[["team","團隊"],["market","市場"],["traction","牽引力，早期成長與需求的證據"],["TAM","潛在市場總量"],["upside","上漲空間，潛在報酬"]]},{"title":"Building Your First MVP","body":"An **MVP** is the smallest version of your product that still solves a real problem. The goal is not to look perfect. The goal is to learn fast. You build just enough, put it in front of users, and watch what they do. Then you change it based on what you see. This loop is called **iteration**. A good MVP tests your riskiest **assumption** first. If people will not use the simple version, a bigger version will not save you. Many founders waste months building features no one wants. Ship early, talk to users, and let real **feedback** guide the next step.","gloss":[["MVP","最小可行產品"],["iteration","迭代，反覆修改改進"],["assumption","假設"],["feedback","回饋意見"]]},{"title":"Finding Product-Market Fit","body":"**Product-market fit** means you have built something people really want. Before it, growth feels slow and hard. After it, you often feel pulled forward by **demand**. Users come back, tell their friends, and get upset if you take the product away. One famous test asks users how they would feel if they could no longer use it. If many say they would be very disappointed, that is a strong sign. Watch your **retention**: are people still active weeks later? High **churn** usually means weak fit. Do not scale spending too early. First find fit, then pour fuel on the fire and grow.","gloss":[["Product-market fit","產品與市場契合"],["demand","需求"],["retention","留存率，用戶持續使用的比例"],["churn","流失率"]]},{"title":"Hiring Your First Employees","body":"Your first **hires** shape the whole company. In the early days, each person is a big part of the team, so one wrong choice hurts a lot. Look for people who are flexible and can do many jobs, since roles are not clear yet. Skills matter, but **culture** fit and drive matter just as much. Most startups cannot pay big salaries, so they offer **equity** instead. This gives early staff a share of the upside if the company wins. Be honest about the risk. Hire slowly, because firing is painful and slow. A small, strong team beats a large, weak one almost every time.","gloss":[["hires","招募進來的員工"],["culture","公司文化"],["equity","股權"]]},{"title":"Small Talk With Investors at Events","body":"At startup events, you will meet investors in casual ways, not just in formal meetings. Do not rush to **pitch**. Start with simple, friendly talk. Ask what they invest in and what has excited them lately. People remember founders who listen, not ones who only sell. If they ask about your company, give a short, clear answer in one or two lines. This is your **elevator pitch**. Then offer to follow up by email. The real goal here is to start a relationship and get a warm **intro** later. Be genuine. Most investors meet hundreds of founders, so being normal and likable already helps you stand out.","gloss":[["pitch","推銷，向投資人介紹公司"],["elevator pitch","電梯簡報，極短的自我介紹"],["intro","引介，介紹認識"]]},{"title":"Writing Investor Updates","body":"A monthly **investor update** keeps your backers informed and engaged. It is a short email, not a long report. Start with the big picture: are things going well or not? Then share your key **metrics**, like users, revenue, and growth. Be honest about problems, because investors can often help if they know. Always include a clear **ask**, such as intros to customers or help with hiring. Founders who hide bad news lose trust fast. Those who write steady, honest updates build strong support over time. Keep it regular, even when the news is hard. A good update turns passive investors into active helpers who feel part of the **journey**.","gloss":[["investor update","投資人月報"],["metrics","指標、數據"],["ask","請求，需要對方協助的事"],["journey","歷程、旅程"]]},{"title":"Understanding a Term Sheet","body":"A **term sheet** is a short document that lists the main terms of an investment. It is not the final contract, but it sets the deal. The most important number is the **valuation**, which decides how much of the company you give away. Watch the **dilution**, or how much your ownership drops after the round. Pay attention to the **liquidation preference**, which says who gets paid first if the company is sold. A clean term sheet keeps these terms fair and simple. Bad terms can hurt you later, even at a high price. Read every line, ask a startup lawyer, and never sign just because the number looks big.","gloss":[["term sheet","投資條件書"],["valuation","估值"],["dilution","股權稀釋"],["liquidation preference","清算優先權"]]},{"title":"Why Set Up a Delaware C-Corp","body":"Most US startups become a **Delaware C-corp**. It sounds strange to register in a small state, but there are good reasons. Delaware has clear, well-tested company law, so courts handle disputes in a way investors trust. Almost every **venture capital** firm expects this structure, and SAFEs and stock options fit it cleanly. A **C-corp** can also issue different share classes, which you need when you raise money. Yes, you pay some yearly fees and a bit more paperwork. But trying to raise with a different structure often scares investors away. Setting it up early, before your first round, saves you painful and costly changes later on.","gloss":[["Delaware C-corp","德拉瓦州C型公司"],["venture capital","創業投資、風險投資"],["C-corp","C型公司，標準的股份有限公司"],["paperwork","文書作業"]]},{"title":"Renting an Apartment","body":"I found a one-bedroom near campus and emailed the landlord to **set up a viewing**. When I got there, I asked about the rent, and he said utilities were not **included**. He also mentioned a **security deposit** of one month's rent, which I'd get back if nothing was damaged. Before signing, I read the **lease** carefully and asked, \"Is there a penalty if I move out early?\" He said yes, so I made sure I could commit. It felt like a lot, but having everything in writing gave me peace of mind.","gloss":[["set up a viewing","安排看房"],["included","包含在內"],["security deposit","押金"],["lease","租約"],["penalty","罰款，違約金"],["move out early","提前搬走"],["peace of mind","安心"]]},{"title":"Opening a Bank Account","body":"During my first week, I went to a bank to **open a checking account**. The teller asked for my passport and proof of address, so I brought a utility bill. She explained there was no **monthly fee** if I kept a minimum balance. I also asked them to **waive** the fee for international wire transfers, but they couldn't. Then I signed up for a **debit card**, which arrived by mail a week later. Before I left, I asked, \"Can I set up direct deposit for my paycheck?\" She said sure, and walked me through it step by step.","gloss":[["open a checking account","開支票帳戶"],["proof of address","地址證明"],["monthly fee","月費"],["waive","免除（費用）"],["debit card","金融卡，簽帳卡"],["direct deposit","薪資直接入帳"],["paycheck","薪水"]]},{"title":"Ordering at a Coffee Shop","body":"I walked into a busy café and the barista asked, \"What can I **get started** for you?\" I said I'd like a medium latte. She asked if I wanted it **for here or to go**, and I said **for here**, since I wanted to sit and read. She also asked if I wanted any milk alternative. I said oat milk, and she added a small **surcharge**. When she called my name, I grabbed my drink and noticed they spelled it wrong, which honestly happens every time. I just smiled, **tipped** a dollar, and found a quiet corner by the window.","gloss":[["get started","開始（為你準備）"],["barista","咖啡師"],["for here","內用"],["to go","外帶"],["surcharge","額外費用"],["tipped","給小費"]]},{"title":"Going to a Networking Event","body":"My friend dragged me to a startup **networking event**, and I was nervous about small talk. I grabbed a name tag and tried to **break the ice** by asking people what they were working on. One founder told me his team had just **closed a seed round**, which is the early funding stage many startups raise at. I didn't have business cards, so we **connected on LinkedIn** instead. Before leaving, someone said, \"Let's **grab coffee** sometime,\" which I learned is a polite way to keep in touch. I left with a few new contacts and a little more confidence.","gloss":[["networking event","人脈交流活動"],["break the ice","破冰，打開話題"],["closed a seed round","完成種子輪募資"],["connected on LinkedIn","在 LinkedIn 上加好友"],["grab coffee","找時間喝杯咖啡"],["keep in touch","保持聯絡"]]},{"title":"When the Video Call Glitches","body":"During a team meeting, my video froze and someone typed, \"You're **frozen**.\" I quickly said, \"Sorry, my connection is **lagging**.\" Then they couldn't hear me, so they wrote, \"You're **on mute**.\" I unmuted and apologized. The whole thing was **breaking up**, so I turned off my camera to save bandwidth. Finally I said, \"Can you hear me now? Let me **rejoin** the call.\" After reconnecting, everything worked fine. I felt a bit embarrassed, but everyone has been there, so they just laughed and we picked up right where we left off.","gloss":[["frozen","畫面卡住"],["lagging","延遲，卡頓"],["on mute","靜音狀態"],["breaking up","斷斷續續"],["bandwidth","網路頻寬"],["rejoin","重新加入"]]},{"title":"Calling Customer Service and Asking for Directions","body":"My internet went down, so I called customer service. A recording said, \"Please **stay on the line**, your call is important to us.\" After being **on hold** for ten minutes, an agent finally **picked up**. I explained the problem, and she said she'd **walk me through** a few steps to reset the router. Later that day, I got lost downtown and stopped a stranger to ask for directions. He said, \"Go straight two blocks, then **make a left** at the light. You can't miss it.\" I thanked him, and sure enough, the station was right there.","gloss":[["stay on the line","別掛斷，請稍候"],["on hold","電話等候中"],["picked up","接起電話"],["walk me through","一步步帶我操作"],["make a left","左轉"],["you can't miss it","你一定找得到"]]}]);
SHADOW.push(...[["Hey, how's it going?","嘿，最近還好嗎？"],["Good morning! How was your weekend?","早安！週末過得怎麼樣？"],["Nice to finally meet you in person.","很高興終於跟你本人見面了。"],["Are you free Thursday afternoon?","你星期四下午有空嗎？"],["Can we push our meeting to two?","我們可以把會議延到兩點嗎？"],["Does next Monday work for you?","下週一對你方便嗎？"],["Sorry, just to make sure I understand,","抱歉，我想確認一下我理解得對不對，"],["Could you say that one more time?","可以麻煩你再說一次嗎？"],["So what you're saying is, we wait?","所以你的意思是，我們先等一等？"],["My bad, that was totally on me.","我的錯，這完全是我的責任。"],["Sorry I'm late, traffic was crazy.","抱歉我遲到了，路上太塞了。"],["Hi, this is Alex from the design team.","你好，我是設計團隊的 Alex。"],["Hey, is this a good time to talk?","嘿，現在方便講話嗎？"],["Hi, you've reached Alex. Leave a message.","你好，這裡是 Alex，請留言。"],["Hey, it's me, give me a call back.","嘿，是我，有空回我電話。"],["Just following up on my last email.","想跟進一下我上一封信。"],["Quick question, do you have a sec?","簡單問一下，你現在有空嗎？"],["Thanks so much, I really appreciate it.","非常感謝，我真的很感激。"],["Could we get a table for two, please?","可以麻煩給我們兩個人的位子嗎？"],["I'll have the same, thanks.","我點一樣的，謝謝。"],["Can we get the check, please?","可以幫我們結帳嗎？"],["Could you give me a hand with this?","你可以幫我一下這個嗎？"],["Would you mind taking a look?","可以麻煩你看一下嗎？"],["I see your point, but I'm not so sure.","我懂你的意思，不過我不太確定。"],["That's fair, though I'd do it differently.","有道理，不過我會用不同的做法。"],["Let me circle back to you tomorrow.","我明天再回覆你。"],["I'm building a dating app where two people have to read a book together before they can even talk.","我做的是一款交友軟體，兩個人必須先一起讀一本書，才能開始聊天。"],["Hi, I'm the founder of Folio. We help people connect over books, not photos.","你好，我是 Folio 的創辦人。我們讓人們透過書，而不是照片來建立連結。"],["Most dating apps optimize for swipes. We optimize for real conversations.","大多數交友軟體優化的是滑卡次數，我們優化的是真實的對話。"],["The problem is simple. People are tired of shallow matches that go nowhere.","問題很簡單，大家厭倦了那些毫無進展的膚淺配對。"],["On most apps, eighty percent of matches never exchange a single message.","在大多數軟體上，百分之八十的配對連一則訊息都沒交換過。"],["We have eight thousand users, and most joined through word of mouth.","我們有八千名用戶，大部分是靠口碑加入的。"],["We're growing about a thousand new users a week, with almost no paid marketing.","我們每週大約增加一千名新用戶，幾乎沒有投放付費行銷。"],["We have around eighteen hundred weekly actives, and that number keeps climbing.","我們的週活躍用戶大約一千八百，而且這個數字持續上升。"],["Forty percent of matched pairs hit our unlock milestone. That's our core engagement signal.","百分之四十的配對達到了我們的解鎖門檻，這是我們核心的互動指標。"],["That's a fair question. Honestly, retention is the metric we watch most closely.","這是個好問題，老實說，留存是我們最密切關注的指標。"],["You're right to push on that. We haven't proven the US market yet, and I won't pretend we have.","你這樣追問是對的，我們還沒驗證美國市場，我不會假裝我們已經驗證了。"],["Our moat comes from the data we build as two readers go through a book together.","我們的護城河來自兩個讀者一起讀完一本書時所累積的資料。"],["I don't think Tinder builds this. It cuts against everything their model is built on.","我不認為 Tinder 會做這個，這跟他們整套模式的根基是衝突的。"],["If that assumption is wrong, the whole thesis breaks. So we test it every week.","如果那個假設錯了，整個論點就會崩掉，所以我們每週都在驗證它。"],["Let me be straight with you. Our biggest weakness right now is early conversation drop-off.","我跟你說實話，我們現在最大的弱點是對話在初期就中斷。"],["I don't have that number on hand, but I'll follow up by email tomorrow.","這個數字我手邊沒有，但我明天會用電子郵件補給你。"],["Fair point. We tried that and it didn't work, so we changed direction.","說得有道理，我們試過那個方法，行不通，所以我們改了方向。"],["Sarah, you should meet David. He's scaling a community product the way you described.","Sarah，你應該認識一下 David，他正在用你說的方式擴張一個社群產品。"],["We actually met last year through Maya. She's been a great supporter of ours.","我們其實是去年透過 Maya 認識的，她一直很支持我們。"],["I'd love twenty minutes next week to walk you through the numbers properly.","我希望下週能有二十分鐘，好好帶你看一遍我們的數據。"],["We're raising eight hundred thousand on a SAFE to reach our next growth milestone.","我們正在用 SAFE 募集八十萬美元，目標是達成下一個成長里程碑。"],["If this resonates with you, I'd really like to find a way to work together.","如果這讓你有共鳴，我很想找到一起合作的方式。"]]);
KNOWLEDGE.push(...[["清算優先權（Liquidation Preference）：公司賣掉時誰先拿錢",["Liquidation Preference","1x non-participating","Participating Preferred"],"清算優先權（liquidation preference）規定公司被賣掉或清算時，投資人能優先於創辦人拿回多少錢。它不是只有破產才會用到，賣公司（exit）也算「清算事件」。\n最常見也最創辦人友善的是「一倍不參與」（1x non-participating）。意思是投資人在拿回本金（一倍）和按股權比例分配之間，只能擇優選一邊，不能兩頭賺。\n舉例，投資人投一百萬拿兩成股權。公司賣三百萬，他按比例只能拿六十萬，太少，所以選擇拿回一百萬本金。公司賣一千萬，他按比例可拿兩百萬，這時就放棄優先權，改選按比例分。\n比較兇的是「參與分配」（participating），俗稱 double dip。投資人先拿回一百萬本金，剩下的再連同其他人一起按比例分。等於同一筆錢賺兩次，創辦人會吃虧。\n還有「倍數」陷阱，例如 2x 或 3x preference，代表投資人要先拿回兩倍或三倍本金，創辦人才分得到。公司賣得不好時，這會把創辦人歸零。\n台灣創辦人談 term sheet 時，盡量守住「1x non-participating」這條底線，這是矽谷對早期輪次的市場標準。\n例句：We held the line at a 1x non-participating preference."],["Option Pool 的稀釋數學：為什麼員工池常算在你頭上",["Option Pool","ESOP","Pre-money","Post-money","Dilution"],"Option pool（員工選擇權池，又叫 ESOP）是公司預留給員工的股份。問題在於「這個池子算在誰頭上」，這會直接吃掉創辦人的股權。\n關鍵術語是 pre-money（投資前估值）。投資人幾乎都會要求，新的 option pool 要在 pre-money 階段就先設好，這叫「pool shuffle」。\n白話說，就是「擴大的員工池只稀釋創辦人，不稀釋新投資人」。投資人拿到的成交後（post-money）比例，是在池子已經挖好之後才計算的。\n舉例，投資前估值八百萬，投資人投兩百萬，成交後估值一千萬，他拿兩成。若同時要求設一成的 pool，這一成等於從創辦人那邊的股權裡擠出來，投資人那兩成不受影響。\n所以同樣是「投兩百萬拿兩成」，有沒有附帶 pool、pool 多大，創辦人最後剩的比例差很多。\n談判時要算「有效 pre-money」（扣掉 pool 之後的真實估值），並爭取池子別開太大，只開到下一輪前真正會用掉的量，通常落在一成到一成五。\n例句：The pool comes out of the pre-money, so it hits you, not them."],["83(b) Election：為什麼這張紙要在 30 天內寄出去",["83(b) election","Vesting","IRS","Fair Market Value"],"如果你拿的是「會分期成熟」（vesting）的限制股，美國國稅局（IRS）預設會在每次股份成熟時，按當下市值課你的稅。公司越值錢，你每年要繳的稅就越高。\n83(b) election 是一張你主動寄給 IRS 的選擇書，告訴它：「我現在就要把全部股份當成已經拿到，現在一次把稅課完。」\n好處是，創辦人在公司剛成立時股票幾乎不值錢，市值（fair market value）趨近於零，所以現在課稅幾乎不用繳什麼。之後增值的部分都走資本利得，稅率更低。\n沒交這張紙，後果很慘。股票每次成熟你都要按當時市值繳稅，現金可能還沒入袋就先被課一筆，俗稱「dry income」。\n最殘酷的是時效。83(b) 必須在你拿到股票（授予日）後三十天內寄達 IRS，逾期一天都不能補救，IRS 完全沒有彈性。\n建議拿到限制股的當天就處理，用掛號寄出並留存證明。這是美國新創創辦人最常見也最致命的疏忽之一。\n例句：File your 83(b) within thirty days, no exceptions."],["為什麼新創都設在美國德拉瓦州（Delaware C-corp）",["Delaware C-corp","Incorporation","Board of Directors","SAFE"],"幾乎所有想拿美國創投的新創，公司都登記成「德拉瓦州的 C 型公司」（Delaware C-corp）。這不是因為德拉瓦稅低，而是有別的理由。\n第一是法律的可預測性。德拉瓦有一套專門審商業糾紛的衡平法院（Court of Chancery），判例累積幾十年，律師和投資人對規則瞭若指掌，少了很多不確定性。\n第二是投資人習慣。美國創投的標準文件，像 SAFE、term sheet，全都預設你是 Delaware C-corp。架構對了，律師費和時間都省。\n為什麼是 C-corp 不是 LLC？因為很多創投基金的結構不方便投 LLC，而且 C-corp 才方便發不同等級的股票（給投資人優先股、給員工普通股）。\n對台灣創辦人來說，常見做法是設一家美國母公司（Delaware C-corp）當募資和持股主體，台灣公司當子公司做研發營運，這叫「翻轉架構」（flip）。\n要注意 C-corp 有「雙重課稅」的缺點，公司賺錢先課一次、分紅再課一次，但對追求被併購或上市退場的新創，這通常不是主要考量。\n例句：Just incorporate as a Delaware C-corp, investors expect it."],["Down Round 與反稀釋：估值跌了，誰來吸收",["Down Round","Anti-dilution","Full Ratchet","Weighted Average"],"Down round 是「比上一輪估值更低的募資」。市場冷或公司沒達標時會發生。它最大的痛點是觸發投資人手上的「反稀釋」（anti-dilution）保護條款。\n反稀釋的用意是，當新一輪股價變便宜，舊投資人覺得自己上輪買貴了，這條款會自動調整他們的換股價，補償他們，代價是進一步稀釋創辦人和員工。\n保護有兩種強度。最兇的是「完全棘輪」（full ratchet），不管舊投資人當初買了多少股，只要後面有人用更低的價格買進，他的換股價就全部下修到那個最低價。\n舉例，舊投資人用每股十元進場，新一輪只賣每股五元，full ratchet 會把他全部的股票都當成每股五元買的，憑空多生出一堆股份，狠狠稀釋創辦人。\n比較公平也最常見的是「加權平均」（weighted average）。它會按「便宜股賣了多少、占整體多少比例」來小幅調整換股價，不是一刀切到底，對創辦人傷害小很多。\n談 term sheet 時，反稀釋幾乎一定有，但要守住「weighted average」這條，避免接受 full ratchet，後者在矽谷早期輪次已是少數且明顯不利的條款。\n例句：Push for weighted average, never accept a full ratchet."],["Pro-rata 與 Super Pro-rata：投資人要的「續投權」",["Pro-rata","Super Pro-rata","Follow-on","Ownership"],"Pro-rata（按比例跟投權）是投資人常要的一條權利，讓他在你下一輪募資時，有權繼續投錢、維持原本的持股比例。\n為什麼投資人在意？因為每一輪募資都會稀釋大家。若早期投資人押對寶，他會想在後續輪次繼續加碼（follow-on），保住自己那塊比例，不被沖淡。\n舉例，某基金現在占你公司一成。下一輪你發行新股，他若行使 pro-rata，就有權認購足夠的新股，讓自己維持在一成，而不是被稀釋到七、八趴。\n「超級按比例」（super pro-rata）更進一步，投資人不只能維持原比例，還能買到「超過」原比例的量，趁好公司起飛時多吃一點股權。創辦人對這條要警覺。\n對創辦人來說，pro-rata 通常是合理、也該給的，但要注意它會「占用」你下一輪的額度。如果幾個舊投資人都要 pro-rata，留給新投資人的就變少了。\n實務上常會設門檻，例如只給「重要投資人」（major investor，持股或投資額超過一定標準者）pro-rata，避免太多小股東都來分額度，把輪次卡死。\n例句：We only give pro-rata rights to major investors."],["董事會組成：股權之外，誰真正能控制公司",["Board of Directors","Board Seat","Protective Provisions","Independent Director"],"很多創辦人以為「我股權過半就掌控公司」，這是誤解。重大決策其實是董事會（board of directors）在管，董事會怎麼組成，往往比你持股幾趴更關鍵。\n早期常見是「三人董事會」，兩席創辦人、一席領投投資人。這樣創辦人在董事會仍占多數。隨著一輪輪募資，投資人席次會越來越多。\n要小心走到「投資人席次過半」那一刻。即使你個人股權還很高，董事會多數一旦不在你這邊，董事會就能換掉執行長，而那個被換掉的人可能就是你。\n比較健康的結構是設「獨立董事」（independent director），不偏創辦人也不偏投資人，由雙方共同同意人選，在僵局時當平衡的一票。\n除了席次，還要看「保護性條款」（protective provisions）。這是投資人就算席次少，仍對某些大事（賣公司、再募資、改章程）握有否決權的清單，等於另一層控制。\n談判重點不是把投資人擋在門外，而是維持「席次平衡，加上否決清單合理」。控制權是一輪一輪慢慢流失的，每次募資都要把董事會結構算進去。\n例句：Watch the board, not just your equity percentage."],["Secondary 老股交易：創辦人怎麼在退場前先拿一點現金",["Secondary","Primary","Liquidity","Cap Table"],"募資分兩種。一般說的「primary」是公司發新股、錢進公司金庫拿去燒。「secondary」（老股交易）則是既有股東把手上的股票賣給別人，錢進的是個人口袋，不進公司。\n為什麼會有 secondary？公司還沒上市或被併購前，創辦人和早期員工的股票是「帳面上的富有」，沒辦法花。secondary 讓他們提早變現一部分，這叫「流動性」（liquidity）。\n常見情境是，公司估值衝很高的後期輪次，創辦人壓力大、家庭有現實開銷，投資人允許他在這輪賣掉一小部分老股，拿個幾十、上百萬安心錢。\n好處是創辦人不用為了短期生活壓力被迫太早賣公司，能更專注把餅做大。投資人也樂見，因為這讓創辦人更願意賭長線。\n但要拿捏分寸。如果創辦人賣太多，會被投資人解讀成「對自己公司沒信心」，是很糟的訊號，所以通常會限制在持股的一小部分。\n另外，secondary 會改變股權結構表（cap table），新買家進場、價格怎麼定都要處理，而且個人賣股要繳資本利得稅。這通常是後期才會碰到的進階操作。\n例句：He took a little secondary to ease the pressure."],["投資人月報怎麼寫：募資不是只在缺錢時才聯絡",["Investor Update","Ask","Runway","KPI"],"很多創辦人只在要錢時才聯絡投資人，這是大錯。固定寫「投資人月報」（investor update）是維繫關係、為下一輪鋪路最便宜有效的方法。\n月報的價值在於，投資人手上有人脈、有客戶、有後續資金。你每月讓他知道進度，他才幫得上忙；你消失三個月，他連你還活著都不確定。\n標準格式不用花俏，開頭一句話講「這個月好還是不好」，接著放幾個關鍵數字（KPI），像營收、用戶、留存，以及還剩多少燒錢時間（runway）。\n最重要的一欄是「我需要什麼幫忙」（the ask）。要寫得具體，例如「想認識某產業的客戶」「在找一位資深工程師」。模糊的求助沒人理，具體的請求才有人接。\n好消息壞消息都要寫。只報喜不報憂，投資人反而會懷疑你在藏東西。坦白講出挑戰，反而建立信任，也讓他有機會出手相救。\n一個實用習慣是，每月固定同一天寄，內容簡短、五分鐘讀完。長期下來，等你正式開下一輪，這些人早就懂你的故事，募資速度會快非常多。\n例句：End every investor update with one clear ask."],["在 Delaware 設立 C-corp 與註冊代理人",["Delaware C-corp","registered agent","incorporation"],"美國新創最常見的法律結構是德拉瓦州的 C-corp。原因不是德拉瓦離你近，而是它的公司法成熟、判例多，幾乎所有矽谷創投在投資前都預設你是德拉瓦 C-corp。如果你是 LLC 或別州公司，募資時很可能被要求先轉換結構，反而多花一筆錢和時間。\n\n為什麼創投偏好 C-corp，而不是稅務上看起來更省的 LLC，因為創投基金的結構需要乾淨的股權，可以發放股票選擇權給員工，未來上市也方便。LLC 在這些情境會卡住，所以即使 C-corp 有「雙重課稅」的名聲，新創圈仍然以它為標準。\n\n註冊代理人（registered agent）是法律規定每家德拉瓦公司都要有的一個美國在地聯絡人，負責收政府公文和法律文件。你人在台灣，無法自己當代理人，所以要付費給專門的服務商。市面上常見的做法是用 Stripe Atlas、Clerky 或 Firstbase 這類一站式服務，它們會幫你完成設立登記、找好註冊代理人、申請 EIN（公司的聯邦稅務編號），整套流程通常一週內可以跑完。\n\n設立後別忘了德拉瓦每年要繳「特許經營稅」（franchise tax）和年度報告，小型新創通常一年幾百美元，漏繳會被罰，所以要記在行事曆上。\n\n以上為一般資訊，非法律或稅務建議，重大決定請諮詢專業人士。"],["用美國新創銀行 Mercury 與 Brex 開戶",["Mercury","Brex","EIN","fintech"],"公司設立完成、拿到 EIN 之後，下一步通常是開一個美國銀行帳戶。傳統大銀行（像 Chase、Bank of America）對外國創辦人不太友善，常常要你本人飛到美國、走進分行才能開戶，對台灣創辦人很不方便。\n\n所以新一代的新創金融科技公司（fintech）出現了，最常見的是 Mercury 和 Brex。它們嚴格來說不是銀行本身，而是和有牌照的銀行合作，提供線上開戶的介面。你可以完全遠端，用護照、公司文件和 EIN 線上申請，不用飛美國，這對海外創辦人是很大的差別。\n\n兩者的定位略有不同。Mercury 偏向一般新創的日常收付和管理，介面乾淨，很多種子期公司用它。Brex 早期偏向已經拿到創投資金、燒錢比較兇的團隊，提供公司信用卡和支出管理。實際選哪個，看你公司的階段和需求，兩個都可以先研究官網的開戶條件。\n\n要注意，這類帳戶通常要求你的公司是正式的美國法人（例如德拉瓦 C-corp），純粹台灣公司是開不了的。另外帳戶裡的錢通常透過合作銀行享有 FDIC 保險，但保障細節各家不同，開戶前值得確認。\n\n以上為一般資訊，非法律或稅務建議，重大決定請諮詢專業人士。"],["美國工作簽證概念：O-1 與 E-2（僅概念）",["O-1 visa","E-2 visa","USCIS"],"想長期待在美國經營公司，光有公司不代表你可以合法工作或居留，這是兩件事。簽證是另一條獨立的路，這裡只講概念，幫你建立大方向，實際申請一定要找移民律師。\n\nO-1 簽證俗稱「傑出人才簽證」，給在自己領域有突出成就的人。對創辦人來說，如果你有得獎紀錄、媒體報導、知名加速器經歷、專利或募資成績，可以用這些材料證明你的「傑出」。它的好處是相對彈性，缺點是材料準備繁瑣，需要很強的佐證。\n\nE-2 簽證是「條約投資人簽證」，前提是你的國籍國和美國之間有相關條約。台灣和美國之間有 E-2 條約，所以台灣護照持有人可以走這條路。概念是你對一家美國公司做出「實質投資」並親自經營，金額沒有硬性下限，但要足以讓公司實際運作。E-2 可續簽，但它不是綠卡，是非移民簽證。\n\n還有人會聽到 H-1B，但那是抽籤制，且通常要有雇主擔保，對自己當老闆的創辦人不一定適合。簽證選擇牽涉個人背景、公司結構、未來是否想拿綠卡，差異很大。\n\n以上為一般資訊，非法律或稅務建議，重大決定請諮詢專業人士。"],["Contractor 與 Employee 的差別，還有 EOR",["contractor","employee","EOR","W-2","1099"],"在美國請人做事，法律上分兩種身分，搞混會出大問題。一種是員工（employee），一種是承包商（contractor，也常叫 independent contractor）。\n\n員工是你公司正式聘僱的人，你要幫他代扣所得稅、繳社會安全和醫療保險的雇主分擔額、處理薪資稅，可能還要給福利。年底開的是 W-2 表。承包商則是獨立接案者，你只付錢給他，他自己負責報稅，年底開的是 1099 表，你不需要幫他扣稅或給福利。\n\n關鍵風險在於，你不能為了省成本，把實際上像員工的人硬說成承包商。美國的勞動主管機關和國稅局有一套判斷標準，看你對這個人的工作方式、時間、工具控制到什麼程度。如果被認定「錯誤分類」（misclassification），公司可能要補繳稅金加罰款，這是常見的踩雷點。\n\n那如果你想在美國（或其他國家）請正式員工，但又不想為了一兩個人去設立當地的薪資和法遵系統，怎麼辦。這時候有一種服務叫 EOR（Employer of Record，名義雇主）。像 Deel、Remote 這類公司會在名義上當那個員工的雇主，幫你處理當地的合約、薪資、稅務和法遵，你每月付服務費。對剛起步、團隊小又分散的新創很實用。\n\n以上為一般資訊，非法律或稅務建議，重大決定請諮詢專業人士。"],["美國新創稅務基本概念",["federal tax","state tax","franchise tax","sales tax"],"美國的稅是多層的，至少要分聯邦、州，有時還有地方，這和台灣單一層級的習慣很不一樣，先有這個心理準備。\n\n第一層是聯邦稅。C-corp 的公司利潤要繳聯邦企業所得稅。所謂的「雙重課稅」是指：公司先繳一次稅，之後把利潤以股利分給股東時，股東又繳一次。不過早期新創通常還在虧損、沒分股利，這個問題短期內感受不深，反而是 C-corp 在募資和發股票選擇權上的好處更實際。\n\n第二層是州稅。每個州規則不同，加州稅重，德州和華盛頓州沒有州所得稅。注意一個容易混淆的點：你在德拉瓦註冊公司，不代表你只跟德拉瓦打交道。如果你實際在加州營運、有員工，你很可能要在加州登記並繳當地的稅，這叫「nexus（連結）」概念。\n\n第三個常被忽略的是銷售稅（sales tax）和德拉瓦的特許經營稅（franchise tax）。franchise tax 是你維持德拉瓦公司資格的年費，跟賺不賺錢無關，一定要繳。銷售稅則看你賣什麼、賣到哪一州。\n\n新創很常用 QuickBooks 記帳，搭配會計師或像 Pilot 這類記帳服務。報稅季別自己硬扛，找懂新創的會計師（CPA）通常省下的麻煩遠多於費用。\n\n以上為一般資訊，非法律或稅務建議，重大決定請諮詢專業人士。"],["建立美國人脈與 cold email 的禮儀",["cold email","warm intro","networking","follow-up"],"在美國，很多機會是透過人脈流動的，創投、合作夥伴、早期使用者都是。但人脈不是一次性交換名片，而是長期累積的信任，台灣創辦人初到容易把它想得太功利。\n\n最有效的接觸方式其實是「溫暖引薦」（warm intro），也就是透過一個雙方都認識的人幫你牽線。創投尤其吃這套，一封朋友轉介的信，遠勝過你直接寄一封陌生信。所以與其急著約大人物，不如先把自己周邊的關係經營好，讓別人願意幫你介紹。\n\n如果真的要寄陌生信（cold email），有幾個禮儀。第一，主旨要短而具體，讓對方一眼知道你是誰、想幹嘛。第二，信要短，三到四句話就好，沒人想讀長篇自我介紹。第三，明確說出你想要什麼，而且要是一個小到對方容易答應的請求，例如「想請教十五分鐘」而不是「想跟你合作」。第四，說清楚你為什麼找的是他，而不是群發。\n\n一封自然的開場可以像這樣：「Hi Sarah, I'm building a reading app in Taiwan.」接著一句你為什麼找她，再一個明確的小請求，最後一句「Would you be open to a quick call?」就夠了。\n\n沒回信很正常，禮貌地追一次（follow-up）即可，通常隔一週，一兩句話，別連環追殺。文化上美國人回信直接、不愛拐彎，你也可以直接，但保持禮貌和尊重對方時間。\n\n以上為一般資訊，非法律或稅務建議，重大決定請諮詢專業人士。"]]);

const READING_ZH = {"What is a SAFE?":"當創辦人第一次募資時，通常會用 SAFE，而不是馬上出售股份。SAFE 讓投資人現在先給你一筆錢，換取未來的股權，這筆股權通常會在下一輪有正式估值的募資時轉換成股份。為了保障早期投資人，SAFE 會設定一個估值上限（valuation cap），有時候還會附帶折扣（discount）。這樣可以讓一切保持簡單：沒有利息，也沒有到期日，而且你不必太早決定公司的估值。對一家還沒什麼成績的早期新創來說，SAFE 又快又便宜，而且是美國市場的標準做法。","Burn rate and runway":"每一位創辦人都必須盯緊兩個數字。你的燒錢速度（burn rate）是指扣掉收入後，公司每個月淨花掉多少現金。你的營運跑道（runway）則是指在錢燒完之前，你還能撐幾個月。如果你每個月燒四萬，手上有五十萬，那麼你的跑道大約是十二個月。投資人會看單位經濟效益（unit economics），來判斷多花錢到底划不划算。先募一輪過橋資金（bridge round）可以爭取時間，但真正的目標，是在跑道用完之前找到產品與市場的契合（product-market fit）。","Why investors fund traction":"點子很便宜，真正稀有的是實際的成長動能（traction）。當創投在評估一個案子時，他們想看到的是：真的有人在用，而且願意付錢買你的產品。良好的用戶留存、持續成長的每月經常性收入（MRR），再加上很低的流失率（churn rate），都代表你做出了大家真正想要的東西。一道守得住的護城河（moat），例如網路效應，會讓他們相信你的領先優勢能夠持續下去。說到底，你的募資簡報（pitch deck）應該講清楚一個故事：這是我們的成長動能，這是我們的護城河，這是我們想募的金額。","Small talk before the meeting":"在任何一場提案之前，都會有一段閒聊，而它的重要性其實超過大多數創辦人的想像。一句溫暖的「最近還好嗎？」和一句真誠的「很高興認識你」，就能定下整場談話的基調。如果你沒聽清楚對方說什麼，直接說「可以請你再說一次嗎？」就好，沒有人會介意。當你需要時間思考時，回一句「我之後再回覆你」是再正常不過的事。投資人也是人，讓自己腳踏實地、好聊又自在，本身就是提案的一部分。把氣氛保持輕鬆、保持真實，並且記得：那些比較難回答的問題，你隨時都可以稍後再回頭處理。","How a SAFE Actually Works":"SAFE 是一種簡單的早期募資方式。投資人現在把錢給你，但還不會馬上拿到股權。取而代之的是，這份 SAFE 會在之後才轉換成股份，通常是在你下一輪有正式估值的募資時轉換。現在大多數的 SAFE 都會設定一個估值上限（valuation cap），用來限制把投資人的錢換算成股份時所採用的估值。有些還會加上折扣（discount），讓他們付的價格比新進投資人低一點。SAFE 並不是貸款，它沒有利息，也沒有到期日。它是由 Y Combinator 設計出來的，目的是讓早期交易又快又便宜。創辦人之所以喜歡它，是因為你可以在幾天內就完成簽約，而不必拖上好幾個月。","What Investors Are Looking For":"當你在提案時，投資人最在意的其實是幾件事。第一是團隊：這些人真的有能力把這個產品做出來，並且賣得出去嗎？第二是市場：市場夠不夠大，足以讓公司快速成長？市場太小，就很難帶來可觀的回報。第三是成長動能（traction）：你有沒有一些早期跡象，能證明大家想要這個東西，例如用戶數或營收？很多投資人會問你的 TAM，也就是你整個市場的總規模。早期投資人承擔了極高的風險，所以他們要找的是有巨大上漲空間的機會。他們很清楚，大多數新創都會失敗，因此少數幾家成功的，就必須能夠賺回整支基金的投入。所以他們想要的，是有機會變得非常龐大的公司，而不只是安全的小公司。","Building Your First MVP":"MVP 是你的產品中，仍然能解決一個真實問題的最小版本。它的目標不是要看起來很完美，而是要快速學習。你只做到剛好夠用的程度，把它端到用戶面前，然後觀察他們的反應。接著，再根據你看到的結果去修改它。這個循環就叫做迭代（iteration）。一個好的 MVP，會優先驗證你風險最高的那個假設。如果連這個簡單的版本大家都不願意用，那麼做出更龐大的版本也救不了你。許多創辦人花上好幾個月，去打造根本沒人想要的功能。盡早把產品推出去、和用戶聊一聊，讓真實的回饋來引導你的下一步。","Finding Product-Market Fit":"產品與市場契合（product-market fit）的意思，就是你做出了大家真正想要的東西。在達到它之前，成長會讓你覺得又慢又吃力。達到它之後，你常常會感覺自己被需求推著往前走。用戶會一再回來、會主動告訴朋友，而且如果你把產品收掉，他們還會生氣。有一個很有名的測試，會去問用戶：如果他們再也不能用這個產品，會有什麼感受？如果很多人說他們會非常失望，那就是一個強烈的訊號。要盯緊你的留存率：幾個星期之後，這些人還活躍嗎？高流失率通常代表契合度還不夠。不要太早把錢砸下去做規模化，先找到契合度，再往火上添柴去成長。","Hiring Your First Employees":"你最早期的這幾位員工，會塑造出整家公司的樣貌。在草創階段，每一個人都佔了團隊很大的一塊，所以一個選錯的決定，會帶來很大的傷害。要找那種有彈性、能身兼多職的人，因為這時候每個人的職責都還不明確。技能固然重要，但是否融入團隊文化，以及那股拚勁，同樣重要。大多數新創都付不出高薪，所以會改用股權（equity）來吸引人。這讓早期員工在公司成功時，能分享到上漲的成果。對其中的風險要誠實以告。請人要慢，因為開除一個人既痛苦又緩慢。幾乎在每一種情況下，一支精簡而強悍的小團隊，都勝過一支龐大而虛弱的大團隊。","Small Talk With Investors at Events":"在新創活動上，你會在很隨意的場合遇到投資人，而不只是在正式的會議裡。不要急著推銷你的產品，先從簡單、友善的閒聊開始。問問他們都投資哪些領域，最近又有什麼事讓他們覺得興奮。大家會記住的，是懂得傾聽的創辦人，而不是那種只顧著推銷的人。如果他們問起你的公司，就用一兩句話給出簡短、清楚的回答，這就是你的電梯簡報（elevator pitch）。接著再提議用電子郵件後續聯繫。在這裡，真正的目標是先建立起一段關係，好讓日後能透過熟人幫你引薦（warm intro）。請保持真誠。大多數投資人都見過成百上千位創辦人，所以光是表現得正常、討人喜歡，就已經能讓你脫穎而出了。","Writing Investor Updates":"每月給投資人的近況更新，能讓你的支持者掌握進度、保持參與。它是一封簡短的電子郵件，而不是一份冗長的報告。開頭先講大方向：目前進展順利還是不順利？接著分享你的關鍵指標，例如用戶數、營收和成長狀況。遇到問題就坦白說，因為投資人只要知道，往往就能幫上忙。每次都附上一個明確的請求，例如幫忙引薦客戶，或協助招募人才。隱瞞壞消息的創辦人，很快就會失去信任；而那些持續、誠實更新的人，會隨著時間累積出強大的支持。就算消息不好聽，也要規律地寫。一封好的近況更新，能讓原本被動的投資人變成主動的幫手，讓他們覺得自己也是這趟旅程的一份子。","Understanding a Term Sheet":"投資條件書（term sheet）是一份簡短的文件，列出一筆投資的主要條件。它不是最終的正式合約，但會定下這筆交易的框架。最重要的數字是估值（valuation），它決定了你要讓出公司多少股份。要留意稀釋（dilution），也就是這一輪募資之後，你的持股比例會下降多少。也要注意清算優先權（liquidation preference），它規定了公司被賣掉時，誰能先拿到錢。一份乾淨的條件書，會讓這些條件保持公平而簡單。不好的條件日後可能傷害到你，就算當下的估值很高也一樣。每一行都要讀過，找一位熟悉新創的律師問清楚，絕對不要只因為數字看起來很大就簽下去。","Why Set Up a Delaware C-Corp":"大多數美國新創都會設立成德拉瓦州的 C 型公司（Delaware C-corp）。在一個小州登記聽起來很奇怪，但其實有充分的理由。德拉瓦州有清楚而且經過長期驗證的公司法，法院處理糾紛的方式也讓投資人信任。幾乎每一家創投都預期你採用這種架構，而且 SAFE（簡單未來股權協議）和員工認股權都能很順地套用在它上面。C 型公司還可以發行不同類別的股份，這在你募資時是必要的。沒錯，你每年要付一些規費，文書作業也稍微多一點。但若想用其他架構去募資，往往會把投資人嚇跑。趁早設立，在你第一輪募資之前就弄好，能省下日後痛苦又昂貴的架構變更。","Renting an Apartment":"我在校園附近找到一間一房的公寓，便寫了電子郵件給房東，約時間看房。到了那裡，我問起房租，他說水電費沒有包含在內。他還提到要付一個月房租的押金，只要沒有任何損壞，之後就會退還給我。簽約之前，我仔細讀了租約，然後問：「如果我提早搬走，會有罰金嗎？」他說有，所以我先確定自己能住滿這段期間。這一切感覺要花不少錢，但所有事情都白紙黑字寫下來，讓我安心許多。","Opening a Bank Account":"來到這裡的第一週，我去銀行開了一個支票帳戶。行員要我出示護照和地址證明，所以我帶了一張水電帳單。她解釋說，只要維持最低存款額，就不用付每月的管理費。我還請他們免收國際電匯的手續費，但他們沒辦法。接著我申辦了一張金融卡，一個星期後就寄到家裡。離開前我問：「我可以設定讓薪水直接匯入這個帳戶嗎？」她說當然可以，並一步一步帶著我完成設定。","Ordering at a Coffee Shop":"我走進一家很忙的咖啡店，咖啡師問我：「請問要幫您點什麼呢？」我說我想要一杯中杯的拿鐵。她問我是內用還是外帶，我說內用，因為我想坐下來看書。她還問我要不要換成植物奶。我說燕麥奶，她便加收了一點點費用。當她叫到我的名字時，我去拿了我的飲料，發現他們把名字拼錯了，老實說每次都這樣。我只是笑一笑，給了一美元小費，然後在窗邊找了一個安靜的角落坐下。","Going to a Networking Event":"我朋友硬把我拉去一場新創的社交活動，而我對閒聊感到很緊張。我拿了一張名牌，試著用「你最近在做什麼專案？」這句話來破冰。有一位創辦人告訴我，他的團隊剛完成一輪種子輪募資（seed round），那是許多新創在很早期所進行的募資階段。我沒有帶名片，所以我們改成在 LinkedIn 上加為聯絡人。離開前，有人說：「改天一起喝杯咖啡吧。」我後來才知道，這是一種禮貌地保持聯絡的說法。我帶著幾個新認識的人脈，還有多了一點點的自信離開。","When the Video Call Glitches":"在一場團隊會議中，我的畫面突然卡住，有人打字說：「你畫面凍住了。」我趕緊說：「抱歉，我的網路有點延遲。」接著他們聽不到我的聲音，於是打字說：「你被靜音了。」我把麥克風打開，向大家道歉。整個連線斷斷續續的，所以我關掉了鏡頭，好節省一些頻寬。最後我說：「現在聽得到我嗎？我重新進一次會議。」重新連上之後，一切就正常了。我覺得有點尷尬，但每個人都遇過這種狀況，所以他們只是笑一笑，我們就從剛剛中斷的地方接著繼續。","Calling Customer Service and Asking for Directions":"我家的網路斷線了，所以我打給客服。一段錄音說：「請別掛斷，您的來電對我們很重要。」在線上等了十分鐘之後，終於有一位客服人員接起電話。我說明了問題，她說她會一步一步帶我重新設定路由器。那天稍晚，我在市中心迷路了，便攔下一位陌生人問路。他說：「往前直走兩個街區，然後在紅綠燈那裡左轉，你絕對不會錯過的。」我向他道謝，果然，車站就在那裡。"};
KNOWLEDGE.push(...[["MRR 與 ARR 怎麼算（含實際算例）",["MRR","ARR","churn","expansion revenue"],"MRR 是 Monthly Recurring Revenue，月經常性收入；ARR 是 Annual Recurring Revenue，年經常性收入。重點在「經常性」三個字，意思是只算每個月都會固定再收一次的訂閱費，一次性的費用不能算進去。\n舉一個最簡單的例子：你的 App 月費 300 元，有 100 個付費用戶，MRR 就是 300 乘以 100，等於 30,000 元。ARR 就是 MRR 乘以 12，等於 360,000 元。注意是乘以 12，不是把過去一年實際收到的錢加總，因為 ARR 衡量的是「以目前的訂閱狀態，未來一年會收到多少」。\n常見錯誤一：把一次性收入混進去。假設這個月有人付了 50,000 元的客製化開發費，那是一次性的，不能算進 MRR，否則你會以為自己 MRR 暴增，下個月就被打回原形。\n常見錯誤二：年繳要除以 12。如果有客戶一次付了一年 3,600 元，你不能把 3,600 全算進這個月的 MRR，要除以 12，等於每月貢獻 300 元的 MRR。\n用戶會流失，這叫 churn（流失）。假設月初 MRR 是 30,000 元，這個月跑掉 3 個用戶（少 900 元），但有 8 個老用戶升級方案多付了（多 1,600 元，這叫 expansion revenue 擴張收入），又新進 10 個用戶（多 3,000 元）。月底 MRR 等於 30,000 減 900 加 1,600 加 3,000，等於 33,700 元。\n投資人最在意的不是 MRR 數字本身，而是「成長率」。你跟投資人說「我們 MRR 從 3 萬成長到 3.37 萬，月成長 12.3%」，比單純說「我們有 3 萬」有說服力得多。\n種子輪常見的好數字參考：月成長率能穩定維持在 10% 到 15%，在早期就算很健康；Y Combinator 等加速器常拿「每週成長 5% 到 7%」當作標竿，那是非常快的節奏，多數團隊達不到，別把它當作必須值。\n一句話記住：MRR 看當下的訂閱動能，ARR 把它放大成一年的故事，兩個都只算「會重複收」的錢。"],["CAC 與 LTV 的健康比例（含算例）",["CAC","LTV","payback period","gross margin"],"CAC 是 Customer Acquisition Cost，獲取一個付費客戶要花多少錢；LTV 是 Lifetime Value（也常寫成 CLTV 或 LTV），一個客戶在他使用你產品的整段期間，總共幫你賺多少錢。這兩個數字一起看，才知道你的生意是賺是賠。\nCAC 怎麼算：把一段期間的行銷加業務總花費，除以同期間新增的付費客戶數。例如這個月投廣告花了 100,000 元，業務人力分攤 50,000 元，總共 150,000 元，帶來 100 個新付費客戶，CAC 就是 150,000 除以 100，等於 1,500 元。\nLTV 怎麼算：用「每月毛利乘以平均使用月數」。注意是毛利不是營收。假設月費 500 元，但金流手續費加伺服器成本佔了 30%，毛利率（gross margin）是 70%，每月毛利就是 350 元。如果客戶平均用 20 個月才退訂，LTV 就是 350 乘以 20，等於 7,000 元。\n健康比例看 LTV 除以 CAC。上面例子是 7,000 除以 1,500，等於 4.67。業界公認的健康門檻是「3 倍以上」，也就是一個客戶帶來的價值，至少是獲取成本的 3 倍。低於 3 表示你賺的勉強夠付獲客成本，太薄；高到 5 以上有時反而代表你「行銷投太少」，可以更積極花錢成長。\n另一個關鍵指標是 payback period（回本期），意思是「賺回 CAC 要幾個月」。用 CAC 除以每月毛利：1,500 除以 350，等於 4.3 個月。SaaS 業界常見的理想是 12 個月內回本，早期能做到半年內回本就很漂亮。\n給投資人的範例句：「我們 CAC 1,500 元、LTV 7,000 元，LTV／CAC 約 4.7 倍，回本期 4.3 個月，所以我們每多投一塊錢廣告，未來會穩定帶回更多。」這句話同時交代了三個指標，投資人一聽就知道你的單位經濟（unit economics）是成立的。\n常見陷阱：用「營收」當 LTV 而不是用「毛利」，會把數字灌得很漂亮，但投資人一問毛利率就破功。一定要用毛利算，誠實的數字才撐得住盡職調查（due diligence）。"],["投資人問「你的競爭對手是誰」怎麼答（附範例）",["competitive landscape","moat","incumbent","differentiation"],"投資人問這題，不是想聽你罵對手，而是在測三件事：你懂不懂市場、你有沒有真正的差異、你會不會天真地說「我們沒有競爭對手」。\n最大地雷就是回答「我們沒有競爭對手」。沒有競爭對手通常代表兩種情況：一是這個需求根本沒人要，二是你功課沒做足。投資人聽到這句話，心裡的評分會直接往下掉。\n正確的結構分三層說。第一層：承認直接競爭對手（做一樣事情的人）。第二層：點出間接競爭對手，或者「目前用戶其實用什麼替代方案」（很多時候對手是 Excel、是 LINE 群組、是用戶現在土法煉鋼的做法）。第三層：講你的差異化（differentiation）和護城河（moat），也就是為什麼用戶會選你，而且選了之後不容易跑掉。\n範例回答（以一個讀書交友 App 為例）：「直接競爭對手是一般交友軟體，像是滑卡配對那一類，他們的問題是流於外貌速配、留存差。間接競爭是讀書社群論壇，但那裡只能討論、不能自然認識人。而我們多數用戶現在的替代方案，其實是在臉書讀書社團發文找同好，效率很低。我們的差異是用『共讀進度』當門檻，雙方都讀到 25% 才解鎖聊天，這層機制讓配對品質高很多，也是抄不走的護城河，因為它需要時間累積的雙人關係資料。」\n這段話為什麼好：它沒有迴避對手，反而把「用戶現在的笨方法」也算進競爭，顯示你真的懂使用情境；最後落在一個別人短期內複製不了的機制上。\n加分技巧：用一句話總結你的定位差異。例如「別人是『先看臉再聊天』，我們是『先一起做一件事再看人』。」一句話讓投資人記得住你跟對手的根本不同。\n要避免的細節：不要花太多時間細數每個對手的功能清單，那會讓你聽起來像在防守。重點永遠放回「為什麼是你會贏」，講對手只是為了襯托你的差異。另外，碰到 incumbent（市場上既有的大公司）時別假裝它不存在，要說清楚你為什麼不會被它一個功能更新就輾過去。"],["投資人問「為什麼是你來做」怎麼答（附範例）",["founder-market fit","unfair advantage","why now","conviction"],"這題在問的是 founder-market fit（創辦人與市場的契合度），白話講就是：這麼多人都能做這件事，憑什麼是你做得起來、做得贏？早期投資人投的是人，這題往往比商業模式還關鍵。\n投資人想聽到的是一種 unfair advantage（不公平的優勢），也就是別人想複製卻短期複製不來的東西。它可以來自三種來源：你的獨特經歷、你對這群用戶異常深的理解、或你已經跑出來的早期成果。\n弱回答長這樣：「因為我覺得這個市場很大、我很有熱情、我們團隊很努力。」這種話每個創辦人都會講，等於沒講，投資人聽完毫無記憶點。\n強回答要具體、要有故事、要有證據。範例（讀書交友 App）：「我自己就是那個痛點本人。我大學時想找人一起讀書、順便認識人，但交友軟體全在比外貌，讀書社團又只能討論不能自然認識。過去一年我沒花錢打廣告，光靠自己經營就累積了 8,000 個註冊用戶、每週新增約 1,200 人，而且光是看數據還不夠，我每週親自跟 10 個用戶聊天，所以我比任何人都清楚這群『想用內容交朋友』的人到底要什麼。這個用戶洞察是用一年的貼身觀察換來的，競爭對手沒辦法在一個季度內補課。」\n為什麼這段強：它同時給了三件事，一是親身痛點（你是用戶本人，不是憑空想像），二是已經做出的牽引力數字（8,000 註冊、週增 1,200），三是難以複製的用戶理解（每週親自訪談）。投資人會覺得這人不只想得到，還已經在跑了。\n如果你還沒有亮眼數字，就把重點放在「獨特經歷」和「異常深的理解」。例如：「我在這個產業做了 6 年，認識前 50 大客戶的採購窗口，這層人脈讓我談下試用的成本幾乎是零，這是新進者要花好幾年才建得起來的。」\n別忘了 why now（為什麼是現在）：投資人也想知道為什麼這件事偏偏現在做得起來，例如某項技術剛成熟、某條法規剛改、某個用戶習慣剛轉變。把「為什麼是你」和「為什麼是現在」綁在一起講最有力。\n一個收尾的範例句：「換成別人來做，他得花一年才走到我今天的起點。」這種話傳達的是 conviction（信念）與不可替代性，正是投資人想從這題聽到的。"],["SAFE 估值上限怎麼影響你最後拿到的股權（數字示範）",["SAFE","valuation cap","conversion","dilution","post-money SAFE"],"SAFE 是一種早期募資工具（全名 Simple Agreement for Future Equity，由 Y Combinator 設計），投資人現在先給你錢，但暫時不替公司定價，等你下一輪正式募資、有了正式估值時，這筆錢才轉換（conversion）成股份。valuation cap（估值上限）是 SAFE 裡最關鍵、最影響你股權的一個數字。\n估值上限的意思是：不管你下一輪估值衝多高，這位早期投資人「最多」用這個上限的價格換股。它是在保護早期投資人，因為他承擔了最早期的風險，理應換到比後面進場的人更便宜的股價。\n用一個完整數字示範。假設你用「post-money SAFE，上限 1,000 萬美元」拿了某天使 100 萬美元。一年後你開 A 輪。\n關鍵在於：post-money SAFE 的上限，是直接拿來算投資人持股比例的。投資人持股約等於「投資金額除以估值上限」，也就是 100 萬除以 1,000 萬，等於 10%。只要之後的正式估值高過 1,000 萬上限，這 10% 就大致鎖定（實務上會因後續新發股而略微稀釋，但 SAFE 投資人這筆的占比是以上限為基準算出來的）。\n對照一下「沒有上限」會怎樣：如果這張 SAFE 沒設上限、又沒有折扣，這 100 萬就得用 A 輪當下的高估值換股。假設 A 輪估值衝到 5,000 萬美元，100 萬只能換到約 2%。\n看出差別了嗎：同樣 100 萬，有沒有 1,000 萬的上限，天使拿到的股權從約 2% 變成約 10%，差了大約五倍。而這多出來的股權，是從「你和其他股東」的口袋裡稀釋（dilution）出來的。所以估值上限訂得越低，對你創辦人越不利，你被稀釋得越多。\n再給一個直覺對照：上限就像「早鳥票封頂價」。早鳥投資人鎖定了一個天花板價格，之後你公司越值錢、正式股價越高，早鳥當初鎖的價格就顯得越划算，他用同樣的錢就換到越多股。\npost-money 與 pre-money SAFE 的差別也要懂：2018 年後 YC 主推的是 post-money SAFE，它的好處是「投資人的持股比例在簽約當下就幾乎鎖定」，你能精準算出被稀釋多少；但壞處是如果你連發好幾張 post-money SAFE，稀釋會疊加，最後你會驚覺自己被稀釋得比想像多。\n實務提醒：簽 SAFE 前一定要把所有 SAFE 攤在一張表上，模擬下一輪轉換後的股權結構（也就是做 cap table）。常見慘劇是創辦人發了五六張不同上限的 SAFE，到 A 輪轉換時才發現自己股權所剩無幾。先算清楚，再簽字。"],["員工股票選擇權的 strike price 與行權是什麼（員工視角範例）",["strike price","exercise","ISO","spread","409A valuation"],"你進一家新創當員工，offer 上常寫「給你 10,000 股選擇權（stock options）」。注意，這不是直接給你股票，而是給你一個「未來可以用某個固定價格買進股票的權利」。那個固定價格就叫 strike price（行使價，也叫 exercise price）。\nstrike price 怎麼定：由公司找第三方做的 409A valuation（估值報告）決定，通常等於你拿到選擇權當下、公司普通股的公允市價。假設報告算出每股 1 美元，你的 strike price 就是 1 美元。\nexercise（行權）的意思，是你真的掏錢、用 strike price 把股票買下來。你有 10,000 股、strike price 1 美元，行權就是付 10,000 美元把這些股票變成你真正持有的股份。在那之前，你手上只是一個「可以買」的權利，不是股票本身。\n你怎麼賺錢：靠 spread（價差），也就是「公司現在每股值多少」減掉「你的 strike price」。舉例，幾年後公司被收購、每股值 11 美元，你的 strike price 是 1 美元，每股價差就是 10 美元，10,000 股就是 10 萬美元的帳面獲利。你花 1 萬美元行權買進、賣出拿回 11 萬，淨賺 10 萬（這還沒扣稅）。\n關鍵直覺：strike price 越低對你越好，因為你的成本越低、價差越大。所以「越早加入、估值越低時拿到的選擇權，strike price 越便宜」，這就是為什麼早期員工的股票潛在報酬大。\n一個要小心的坑：選擇權通常綁離職後的行權期限。很多公司規定你離職後只有 90 天可以行權，過了就作廢（近年有些公司會延長到數年，要看你的合約怎麼寫）。假設你做了三年、選擇權都 vested（到期可用）了，但離職時公司還沒上市、股票賣不掉，你要嘛自掏腰包先付那筆行權金把股票買下來、賭未來，要嘛放棄。這是很多員工沒料到的現金壓力。\n稅務一句話提醒：美國的 ISO（Incentive Stock Option，獎勵型選擇權）如果你行權後價差很大，可能觸發 AMT（Alternative Minimum Tax，替代性最低稅負），等於「股票還沒賣、就先被課稅」。金額大時務必先問會計師，別等報稅季才嚇一跳。\n給員工的判斷範例句：「我這 10,000 股，strike price 1 美元，等於我要先準備 1 萬美元才買得下來；只有公司每股漲超過 1 美元，這份選擇權對我才開始有實際價值。」用這個算式，你就能評估一份 offer 裡的股票到底值不值得期待。"],["投資人說「我要再想想」（I'll think about it）的潛台詞與接法",["I'll think about it","soft no","follow-up"],"在美國募資，投資人幾乎不會當面說「不」。他們會用客氣的話包裝拒絕，這叫 soft no（軟性拒絕）。「我要再想想」九成是禮貌版的「沒興趣」，只有一成是真的還在考慮。\n為什麼會這樣？因為創投圈很小，投資人不想得罪你，也不想留下「很兇」的名聲，所以他們把球踢回給你，讓你自己慢慢淡掉。\n常見的 soft no 句型有三種：「This is interesting, let me think about it.（這很有趣，讓我想想）」「Keep me posted on your progress.（有進展再跟我說）」「You're a bit early for us right now.（對我們來說現在還太早）」這些聽起來像鼓勵，其實多半是在禮貌地離場。\n怎麼分辨真假？看他有沒有「給你一個具體的下一步」。真有興趣的會說「我下週把我合夥人也找來一起聊」或「你方便寄財務模型給我嗎」；只說「再想想」卻不約下一次見面、不要任何資料，就是軟拒絕。\n接法一（逼出真實意見）：「Totally understand. Just so I can improve, is there a specific concern holding you back, the market size, the team, or the traction?」意思是「完全理解，為了讓我改進，能告訴我具體卡在哪嗎，是市場規模、團隊、還是成績」。直接問是哪一塊卡住，把模糊變具體。\n接法二（給明確的台階）：「Makes sense. Would it help if I circled back next month after we hit 500 users, or is now just not the right fit?」意思是「合理，那我下個月做到 500 個用戶後再找你會不會比較好，還是現在就不太適合」。給他一個乾脆說不的機會，反而更省雙方時間。\n心態調整：在矽谷，種子輪募資常常要見 50 到 100 個投資人，才拿到幾張支票，被拒是常態。把每個「再想想」當成練習，問出一個真實意見，比硬凹一張支票更值錢。\n一個實戰數字：知名種子基金一年通常看 2000 到 3000 個案子，最後只投 20 到 30 個，命中率約 1%。所以「不」是預設值，「是」才是例外，別把婉拒放在心上。"],["怎麼要一個 warm intro（溫暖引薦）並附上範例 email",["warm intro","double opt-in","forwardable"],"在美國募資，cold email（陌生開發信）的回覆率很低，常常低於 5%。投資人真正會認真看的是 warm intro，也就是有共同朋友幫你引薦。一封好的 warm intro，能讓你的見面機率從個位數百分比，跳到一半以上。\n要 warm intro 的標準做法叫 double opt-in（雙向同意）。你不是直接叫朋友把你的資料丟給投資人，而是先寫一段「可以直接轉發的介紹文字」（forwardable blurb）給你的朋友，讓他先問投資人「要不要認識這個人」，投資人說好，才正式接上。這樣不會讓你的朋友難做人。\n關鍵心法：你要把朋友的工作做到最簡單。朋友很忙，你寄給他的東西要能「直接複製貼上轉發」，他不用改一個字。\n範例（你寄給中間人朋友 David 的信）：\n「Hi David，想請你幫個忙。我在募 Folio 的種子輪（以共讀交友的 App，已有 8000 註冊、月增約 1000）。我記得你認識 a16z 的 Sarah，如果方便，可以幫我引薦嗎？\n下面這段你可以直接轉發給她，不用改：\n（轉發內容開始）\n主旨：Intro: Folio（books-based social app, 8K users）\nHi Sarah，想介紹你認識 Folio 的創辦人。他們做的是用共讀交朋友的 App，目前已做到 8000 註冊、月增約 1000、聊天室解鎖率 41%。他正在募 60 萬美金的種子輪。覺得可能符合你對早期社交產品的興趣，要不要我幫你們接上？\n（轉發內容結束）\n如果她沒興趣完全沒關係，謝謝你！」\n為什麼這樣寫有效：（1）主旨就帶 traction 數字，投資人一眼看到亮點。（2）把「介紹文字」獨立框出來、明確說「不用改」，朋友零負擔。（3）最後一句「沒興趣沒關係」給朋友台階，他不會覺得在強迫推銷。\n小提醒：引薦你的人，越是投資人信任的對象（例如同基金投過的其他創辦人、或他的合夥人），效果越好。找「只是同公司前同事」這種弱連結，效果會差一截。"],["30 秒電梯簡報（elevator pitch）逐句範例",["elevator pitch","traction","ask"],"電梯簡報是指你在 30 秒內，讓對方聽懂「你做什麼、有多大、現在做到哪、要什麼」。名字來自「在電梯裡遇到大咖，只有一層樓的時間」。重點不是塞滿資訊，而是讓對方想多問一句。\n一個好用的五句公式：（1）我們是誰、解決什麼問題。（2）市場有多大、痛點多強。（3）我們的做法為什麼不一樣。（4）目前的成績（traction，牽引力）。（5）我們在募多少、要做什麼（the ask，你的請求）。\n逐句範例（以 Folio 為例）：\n第一句（問題）：「現在的交友 App 都靠滑照片，認識的人很表面。我們做 Folio，讓人透過『一起讀一本書』來認識彼此。」\n第二句（市場）：「光是台灣就有上百萬人用交友 App，但留存很差，大家已經厭倦了外貌配對。」\n第三句（差異）：「我們的機制很特別，兩個人要各自把書讀到 25%、各寫一則心得，聊天室才會解鎖。關係是從共讀『長』出來的，不是靠話術堆出來的。」\n第四句（成績）：「上線幾個月，已經 8000 註冊、每週新增約 1000 人、聊天室解鎖率 41%。」\n第五句（請求）：「我們正在募 60 萬美金的種子輪，主要拿來做成長和出海美國市場。」\n為什麼這樣排：先用「問題」勾住對方（人人都懂交友 App 很表面），再用「成績」證明不是空談（8000、41% 這種具體數字最有說服力），最後明確說「要多少錢、做什麼」，讓對方知道怎麼幫你。\n常見錯誤有三個：（1）一開口就講技術細節，對方聽不懂也不在乎。（2）形容詞太多、數字太少，「我們成長很快」遠不如「月增 1000 人」。（3）沒有 the ask，講完對方不知道你要什麼。\n練習法：對著手機計時念，超過 35 秒就砍句子。砍到剩骨架，每個字都要值錢。"],["Runway（資金跑道）不夠時的三條路：裁員、橋輪、轉向",["runway","bridge round","pivot","layoff"],"Runway 是指「以現在的燒錢速度，公司還能活幾個月」。算法很簡單，銀行裡的錢除以每月淨燒（net burn）。例如戶頭有 60 萬美金、每月燒 5 萬，runway 就是 12 個月。當 runway 剩 6 個月以下，你就該行動了，因為募資本身往往要花 3 到 6 個月。\n第一條路：裁員（layoff）或砍成本。把每月燒錢壓下來，runway 自動變長。\n情境：你 10 個人、月燒 8 萬，runway 剩 5 個月。如果裁掉 3 人、再砍掉一些工具訂閱，月燒降到 5 萬，runway 立刻從 5 個月變成 12 個月，多出來的時間可能就夠你做出成績再去募資。代價是士氣和產能會掉，要一次砍到位，別分多次（多次裁員最傷團隊信心）。\n第二條路：橋輪（bridge round）。向「現有投資人」再要一筆小錢，當作撐到下一輪的橋。\n情境：你還需要 3 個月才能達到 A 輪要的數字，但錢只剩 2 個月。你回頭找種子輪投資人說：「再給我 15 萬美金，我就能把月活做到 1 萬，那時 A 輪估值會更高，對你也有利。」橋輪通常用 SAFE 或可轉換票據（convertible note）快速完成，而且常帶折扣（例如下一輪估值打 8 折轉股）。注意：橋輪有時會被外界解讀成「募不到新錢的求救訊號」，要包裝成「進攻型加碼」而不是「快沒錢了」。\n第三條路：轉向（pivot）。如果數字怎麼救都救不起來，代表方向可能錯了，那就趁還有錢時換題目。\n情境：你做的 App 用戶不成長，但你發現「裡面那個小功能」反而很多人用。趁 runway 還剩 4 個月，把全公司轉去做那個功能。經典案例：Slack 原本是做一款線上遊戲的，遊戲失敗，但他們內部用的聊天工具大受歡迎，轉向後變成一家百億美金等級的公司。Pivot 的鐵則是趁「還有錢、還有團隊」時轉，等到剩 1 個月才轉就來不及了。\n選擇邏輯：成績其實在成長、只是差臨門一腳，選橋輪；成本結構太重、但產品方向是對的，選裁員撐住；產品根本沒人要，選 pivot。最怕的是什麼都不做，眼睜睜看 runway 歸零。"],["第一次跟投資人 coffee chat（初次聊聊）會被問什麼：清單加範例答法",["coffee chat","traction","moat","go-to-market"],"Coffee chat 是指正式提案前的「非正式聊聊」，通常 30 分鐘，目的是互相試水溫。氣氛輕鬆，但投資人其實在偷偷評估你。別被「只是喝杯咖啡」騙了，準備要充分。\n問題一：「Tell me about your company.（簡單說說你們在做什麼）」這是開場，等於要你講電梯簡報。\n範例答法：「我們做 Folio，用『一起讀一本書』來交朋友。機制是兩人各讀到 25% 並各寫一則心得，聊天室才解鎖。上線幾個月做到 8000 註冊、解鎖率 41%。」一分鐘內講完，別拖。\n問題二：「Why you? Why now?（為什麼是你做、為什麼是現在）」投資人想知道你和這個時機的獨特性。\n範例答法：「我自己就是重度交友 App 用戶，受夠了表面互動。加上這兩年大家對滑照片的疲乏到了臨界點，留存普遍變差，正是切入的時機。」\n問題三：「How big can this get?（這能做多大）」他在評估市場天花板。\n範例答法：「光台灣交友 App 用戶就有上百萬，全球是上看數十億美金的市場。我們先用台灣驗證機制，再複製到美國 BookTok 那群女性讀者。」給數字、給擴張路徑。\n問題四：「What's your traction?（你們現在的成績）」最關鍵的一題，投資人最看重。\n範例答法：「8000 註冊、每週新增約 1000、聊天室解鎖率 41%、累積 3.4 萬則便利貼。」全部用數字，不要說「成長不錯」。\n問題五：「What's your moat?（你的護城河是什麼，別人為何抄不走）」\n範例答法：「我們的壁壘是共讀關係資料的累積，加上多國上架踩過的合規流程，這些競品很難快速複製。」就算坦白說現在沒有絕對護城河也沒關係，重點是你有想過。\n問題六：「Who's on the cap table, and are you raising right now?（誰投了、你現在在募嗎）」\n範例答法：誠實講。「目前股權主要在創辦團隊手上，這是我們第一次對外募種子輪，正在跟幾位天使聊。」別假裝有一堆人搶，謊言很快會被識破。\n反向加分：最後他通常會問「你有什麼想問我的嗎？」一定要準備問題，例如「你們投完之後，通常怎麼幫被投公司？」展現你在挑投資人，不是只想拿錢。完全不問問題，會顯得你沒在思考這段關係。\n收尾：聊完當天寄一封簡短感謝信，附上一頁簡報或數據連結，保持聯絡。"],["「這家公司最後怎麼賺大錢」：商業模式與終局思維（endgame）範例",["business model","endgame","unit economics","LTV","CAC"],"投資人投早期公司，不是看你「現在賺多少」，而是看「終局（endgame）能不能變成一家很大的公司」。創投基金的數學是這樣：投 10 家，可能 7 家死、2 家平平、1 家賺 50 倍以上，靠那 1 家賺回整支基金。所以他們只想投「有機會變超大」的公司。\n第一步要講清楚「商業模式」，也就是你到底怎麼把產品變成錢。常見幾種：訂閱制（每月收費）、抽成（交易抽一個百分比）、廣告、加值服務（freemium，基本免費、進階收費）。\n範例（以交友 App 為例）：「我們先用免費版衝用戶量，之後推訂閱，每月 9.9 美金解鎖『看誰想跟你共讀』和『更多每日配對』。交友 App 的付費轉換率業界大約 2 到 5%。假設我們有 100 萬月活用戶、3% 付費、每人每月貢獻 10 美金，那就是每月 30 萬美金、一年 360 萬美金的營收。」用具體數字算給投資人聽，比空談有力 10 倍。\n第二步要懂「單位經濟（unit economics）」，也就是「每抓一個付費用戶到底賺不賺錢」。核心是兩個數字：CAC（獲客成本，抓一個用戶花多少錢）和 LTV（顧客終身價值，一個用戶整段生命週期帶來多少錢）。\n範例：「如果我們花 5 美金抓到一個付費用戶（CAC＝5），而這個用戶平均訂閱 8 個月、每月 10 美金，貢獻 80 美金（LTV＝80），那 LTV 對 CAC 的比值就是 16 倍。」業界常用的健康標準是 LTV 對 CAC 大於 3。如果低於 1，代表你每抓一個用戶就虧錢，規模越大死越快。\n第三步講「終局思維」，把時間拉到 7 到 10 年後，這家公司長什麼樣？\n範例答法：「我們的終局不只是一個交友 App，而是『以書為核心的興趣社交網路』。先靠共讀交友切入，再延伸到讀書會、書評社群、出版合作。10 年後我們想成為華語圈最大的讀書社交平台，那是一個數十億美金等級的市場。」\n第四步講「退場（exit）」，也就是投資人最後怎麼把錢拿回來。通常兩種：被收購（被大公司買走）或 IPO（上市）。\n範例：「以我們的賽道，最可能的退場是被大型社交或交友集團收購。這類併購過去有先例，例如 Match Group 收購過多個交友 App，金額從數千萬到數十億美金都有。」\n總結邏輯：講賺錢要一條線講通，從「怎麼收費」到「每個用戶賺不賺錢」到「規模能多大」到「最後怎麼變現給投資人」。投資人要的不是你已經賺大錢，而是相信你「已經想清楚怎麼賺大錢」。"]]);

/* ==== Cofounder equity pack ==== */
KNOWLEDGE.push(
  ["共同創辦人股權怎麼分（你和朋友 7:3 的考量）", ["cofounder equity","equity split","vesting","dead equity"],
   "很多人以為共同創辦人就該五五分，其實不一定。股權怎麼分，主要看四件事：誰想出原始點子、誰投入的時間多、誰承擔的風險大（有沒有辭職全職做、有沒有出錢）、誰負責的角色更關鍵。\n你們打算 7:3，只要這個比例真的反映上面這些差異，就完全合理。例如你全職做、出了啟動資金、又是技術和產品主力，朋友是兼職幫特定部分，那麼 7:3 甚至 8:2 都說得過去。\n但先想清楚兩個風險。第一，分得太不平均，拿少的一方在累的時候容易覺得不值得而離開，這對早期小團隊是大傷。第二，現在預期的貢獻，未必等於未來實際的貢獻，人和投入都會變。\n三個實務建議。一，把為什麼是 7:3 白紙黑字寫下來，雙方簽名同意，口頭講好最容易翻臉。二，務必搭配 vesting（見下一篇），股權四年慢慢給，不是今天就一人 30% 落袋。三，可以保留一個小的未分配池（例如 10%），留給之後貢獻特別大的一方或新夥伴，不要一開始就把話講死。\n投資人看的不是你們分幾比幾，而是有沒有寫清楚、有沒有 vesting。比例只要合理、文件乾淨，他們不會挑剔。\n以上為一般資訊，不是法律建議，正式簽約前建議找新創律師看過。"],
  ["共同創辦人之間也一定要簽 Vesting（不只給員工）", ["vesting","cliff","dead equity","cofounder agreement"],
   "vesting（分期歸屬）不是只給員工的，共同創辦人之間更需要。意思是講好的股權，要分四年才慢慢真正歸你，最常見是四年 vesting、一年 cliff。\n白話跑一次：朋友拿 30%。簽了 vesting 後，他不是今天就擁有 30%。第一年有 cliff（懸崖），要做滿一年，才一次拿到四分之一也就是 7.5%；之後每個月再慢慢歸屬，做滿四年才完整拿到 30%。\n為什麼非簽不可，舉個血淋淋的例子：你和朋友 7:3 開始，三個月後他覺得太累不做了。如果沒有 vesting，他直接帶走 30% 走人，剩你一個人扛公司卻只有 70%，而離開的人坐擁 30% 什麼都不用做。這叫 dead equity（死股權），未來募資時投資人一看就皺眉，甚至要求你想辦法把它買回來。\n有了 vesting，同樣情況他三個月就走、連 cliff 都還沒過，一股都拿不到，股權乾乾淨淨回到公司。\n所以順序是：先談好 7:3，再一定搭配 vesting，兩個一起白紙黑字簽。少了 vesting，再好的比例都是定時炸彈。\n以上為一般資訊，不是法律建議，建議用標準的共同創辦人協議範本並請律師確認。"]
);
